<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🔆 Long Vowels · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .vowel-selector { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
    .vs-btn { width:clamp(60px,16vw,90px); height:clamp(60px,16vw,90px); border-radius:50%; border:4px solid #eee; background:white; font-family:'Fredoka One',cursive; font-size:clamp(1.6rem,6vw,2.4rem); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
    .vs-btn.active { color:white; transform:scale(1.1); border-color:transparent; box-shadow:var(--shadow-md); }
    .vs-btn:active { transform:scale(0.93); }

    .pattern-section { background:white; border-radius:28px; padding:24px 20px; box-shadow:var(--shadow-md); margin-bottom:20px; animation:fadeIn 0.3s ease; }
    .pattern-title { font-family:'Fredoka One',cursive; font-size:clamp(1.4rem,5vw,2rem); margin-bottom:16px; }
    .pattern-rule  { background:#f8f8f8; border-radius:16px; padding:12px 16px; font-size:1.1rem; font-weight:700; margin-bottom:16px; border-left:6px solid var(--clr-primary); }
    .words-wrap { display:flex; flex-wrap:wrap; gap:10px; }
    .lv-word { background:#f0f0f0; border-radius:50px; padding:10px 20px; font-family:'Fredoka One',cursive; font-size:clamp(1.2rem,4vw,1.6rem); cursor:pointer; transition:all 0.15s; border:3px solid transparent; }
    .lv-word:active { transform:scale(0.93); }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Long Vowels</span>
    </div>
    <div class="nav-right"></div>
  </nav>
  <div class="page-header" style="background:linear-gradient(135deg,#f4a228,#FFE66D)">
    <h1>🔆 Long Vowels</h1>
    <p>Vowels that say their own name!</p>
  </div>
  <main>
    <div class="vowel-selector" id="vowel-selector" style="margin-top:24px"></div>
    <div id="patterns-container"></div>
  </main>
  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const LONG_VOWELS = {
      A: { color:'#FF6B35', patterns:[
        {rule:'a_e (Magic E)', words:['cake','make','late','name','game','tape','wave','gate','same','came']},
        {rule:'ai (vowel pair)', words:['rain','train','mail','tail','paid','sail','wait','plain','brain','chain']},
        {rule:'ay (end of word)', words:['day','pay','say','stay','play','clay','gray','pray','spray','stray']},
      ]},
      E: { color:'#4ECDC4', patterns:[
        {rule:'ee (double e)', words:['bee','tree','see','free','green','meet','feet','keep','need','feed']},
        {rule:'ea (vowel pair)', words:['eat','read','leaf','beach','teach','each','bean','clean','dream','steam']},
        {rule:'e_e (Magic E)', words:['here','theme','these','eve','scene','delete','gene','pete']},
      ]},
      I: { color:'#A78BFA', patterns:[
        {rule:'i_e (Magic E)', words:['bike','like','time','five','pine','mine','ride','side','kite','hide']},
        {rule:'ie (vowel pair)', words:['pie','tie','lie','die','cried','dried','flies','fried','tried','spied']},
        {rule:'igh (trigraph)', words:['high','night','light','right','sight','tight','might','flight','bright','slight']},
      ]},
      O: { color:'#FFB347', patterns:[
        {rule:'o_e (Magic E)', words:['bone','home','nose','rose','rope','hole','mole','vote','note','tone']},
        {rule:'oa (vowel pair)', words:['boat','coat','road','toad','load','oak','goal','float','groan','toast']},
        {rule:'ow (special)', words:['snow','blow','flow','grow','show','glow','own','bowl','know','crow']},
      ]},
      U: { color:'#6BCB77', patterns:[
        {rule:'u_e (Magic E)', words:['cube','tune','dune','mule','rude','fuse','cute','huge','rule','use']},
        {rule:'oo (special)', words:['moon','food','cool','pool','room','noon','boot','tooth','smooth','school']},
        {rule:'ew (special)', words:['new','few','dew','flew','grew','crew','drew','knew','stew','brew']},
      ]},
    };

    let selected = 'A';
    const colors = { A:'#FF6B35', E:'#4ECDC4', I:'#A78BFA', O:'#FFB347', U:'#6BCB77' };

    const selector = document.getElementById('vowel-selector');
    Object.keys(LONG_VOWELS).forEach(v => {
      const btn = document.createElement('button');
      btn.className = `vs-btn ${v===selected?'active':''}`;
      btn.textContent = v;
      btn.style.background = v===selected ? colors[v] : '';
      btn.style.color = v===selected ? 'white' : '';
      btn.addEventListener('click', () => {
        selected = v;
        selector.querySelectorAll('.vs-btn').forEach(b => {
          const lv = b.textContent;
          b.classList.toggle('active', lv===v);
          b.style.background = lv===v ? colors[lv] : 'white';
          b.style.color = lv===v ? 'white' : '';
        });
        buildPatterns();
        AudioManager.speak(`Long ${v}`, {rate:0.75});
      });
      selector.appendChild(btn);
    });

    function buildPatterns() {
      const container = document.getElementById('patterns-container');
      container.innerHTML = '';
      const data = LONG_VOWELS[selected];
      data.patterns.forEach(p => {
        const sec = document.createElement('div');
        sec.className = 'pattern-section';
        sec.style.borderTop = `5px solid ${data.color}`;
        const title = document.createElement('div');
        title.className = 'pattern-title';
        title.textContent = `Long ${selected}: ${p.rule}`;
        title.style.color = data.color;
        const rule = document.createElement('div');
        rule.className = 'pattern-rule';
        rule.style.borderColor = data.color;
        rule.textContent = `Pattern: "${p.rule}"`;
        const wrap = document.createElement('div');
        wrap.className = 'words-wrap';
        p.words.forEach(w => {
          const chip = document.createElement('div');
          chip.className = 'lv-word';
          chip.textContent = w;
          chip.style.borderColor = data.color + '55';
          chip.addEventListener('click', () => {
            AudioManager.speak(w, {rate:0.75});
            AudioManager.playTone('click');
            chip.style.background = data.color;
            chip.style.color = 'white';
            setTimeout(() => { chip.style.background=''; chip.style.color=''; }, 600);
          });
          wrap.appendChild(chip);
        });
        sec.appendChild(title);
        sec.appendChild(rule);
        sec.appendChild(wrap);
        container.appendChild(sec);
      });
    }

    buildPatterns();
  </script>
</body>
</html>
