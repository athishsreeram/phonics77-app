<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 Story Time · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.story-card { background:white; border-radius:28px; padding:32px 24px; box-shadow:var(--shadow-md); max-width:600px; margin:28px auto; }
.story-tabs { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
.stab { background:#f3f4f6; border:3px solid transparent; border-radius:12px; padding:10px 16px; font-weight:800; font-size:.9rem; cursor:pointer; transition:all .2s; }
.stab.active { background:var(--clr-primary); color:white; }
.story-emoji { font-size:4rem; text-align:center; display:block; margin:12px 0; }
.story-title { font-family:'Fredoka One',cursive; font-size:2rem; text-align:center; color:var(--clr-primary); margin-bottom:20px; }
.story-body { font-size:1.15rem; line-height:2; font-weight:600; color:#2d2d2d; }
.story-body .phonics-word { color:var(--clr-primary); font-weight:800; cursor:pointer; border-bottom:2px dotted var(--clr-primary); }
.story-body .phonics-word:hover { background:#fff0f0; border-radius:4px; }
.read-controls { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:24px; }
.loading-msg { text-align:center; padding:32px; color:#888; font-size:1rem; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Story Time</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#f97316,#ea580c)">
  <h1>📖 Story Time</h1>
  <p>Read along — tap words to hear them!</p>
</div>
<main>
<div class="story-card">
  <div class="story-tabs" id="story-tabs"></div>
  <span class="story-emoji" id="story-emoji">⏳</span>
  <h2 class="story-title" id="story-title">Loading stories…</h2>
  <div class="story-body" id="story-body"><p class="loading-msg">Fetching stories from the library…</p></div>
  <div class="read-controls">
    <button class="btn btn-primary btn-lg" id="btn-read">🔊 Read Story</button>
    <button class="btn btn-secondary" id="btn-stop">⏹ Stop</button>
  </div>
</div>
</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script>

// ── Hardcoded fallback stories (used if API is unavailable) ──────────────────
const FALLBACK_STORIES = [
  {
    id: 'f1', title: 'Mac and Tab', emoji: '🐱', set: 1,
    phonics: ['mac','tab','cat','sad','mad','pal','rat','nap'],
    text: 'Tab is a sad cat. Tab has a pal. His pal is Mac. Mac is a rat. "I got mad at Mac," said Tab. "I ate Mac up." "I did like Mac," said Tab. "I am a bad cat." Tab ran to get the vet. "I can save Mac," said the vet. Mac gave Tab a hug. "I like Tab," said Mac. Mac and Tab ran home.',
  },
  {
    id: 'f2', title: 'The Bee', emoji: '🐝', set: 2,
    phonics: ['bee','black','yellow','flower','busy'],
    text: 'A bee was in the grass. The bee was black and yellow. The bee went up in the air. A cat saw the bee. "I will get the bee," said the cat. The bee went up high. The bee went to a flower. A kid watched the bee. The bee was busy.',
  },
  {
    id: 'f3', title: 'Slide', emoji: '🛝', set: 3,
    phonics: ['slide','slid','fast','kid'],
    text: 'A kid had a slide. The slide was big and red. The kid slid on the slide. "Look at me," said the kid. "I can slide fast." A pig ran up. "I can slide," said the pig. They slid and slid. They had a nap.',
  },
];

let STORIES = [];
let curStory = 0;

// ── Render tabs ────────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = document.getElementById('story-tabs');
  tabs.innerHTML = '';
  STORIES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = `stab${i === curStory ? ' active' : ''}`;
    // Support both API stories (title field) and legacy (title field)
    const title = (s.title || '').split(' ').slice(0, 2).join(' ');
    btn.textContent = (s.emoji || '📖') + ' ' + title;
    btn.addEventListener('click', () => { curStory = i; renderStory(); renderTabs(); });
    tabs.appendChild(btn);
  });
}

// ── Render story body ──────────────────────────────────────────────────────
function renderStory() {
  const s = STORIES[curStory];
  if (!s) return;

  document.getElementById('story-emoji').textContent = s.emoji || '📖';
  document.getElementById('story-title').textContent = s.title;

  // Support both API format (s.content) and legacy format (s.text)
  const storyText = s.content || s.text || '';
  // Support both API format (s.words array) and legacy (s.phonics array)
  const phonicsWords = new Set((s.words || s.phonics || []).map(w => w.toLowerCase()));

  const body = document.getElementById('story-body');
  body.innerHTML = storyText.split(/\b/).map(w => {
    const clean = w.toLowerCase().replace(/[^a-z]/g, '');
    if (phonicsWords.has(clean)) {
      return `<span class="phonics-word" onclick="AudioManager.speak('${clean}',{rate:.7})">${w}</span>`;
    }
    return w;
  }).join('');

  // Track story open
  if (typeof analytics !== 'undefined') {
    analytics.logEvent('story_open', { storyId: s.id, title: s.title });
  }
}

// ── Load stories from API, fall back to hardcoded ─────────────────────────
async function loadStories() {
  let apiStories = [];

  try {
    apiStories = await PhonicsAPI.getStories();
  } catch(e) {
    console.warn('[story] API unavailable, using fallback stories');
  }

  if (apiStories && apiStories.length > 0) {
    STORIES = apiStories;
    console.log(`[story] Loaded ${STORIES.length} stories from API`);
  } else {
    // Fall back to the full hardcoded set
    STORIES = FALLBACK_STORIES;
    console.log('[story] Using fallback stories');
  }

  curStory = 0;
  renderTabs();
  renderStory();
}

document.getElementById('btn-read').addEventListener('click', () => {
  const s = STORIES[curStory];
  if (s) AudioManager.speak(s.content || s.text || '', { rate: .8 });
  // Mark story-time activity complete when a story is read
  // Curriculum: mark story-time complete when a story is read
  if (window.CurriculumManager && typeof window.CurriculumManager.markActivityComplete === 'function') {
    window.CurriculumManager.markActivityComplete('story-time');
  }
});
document.getElementById('btn-stop').addEventListener('click', () => AudioManager.stop());

// Load on DOM ready
loadStories();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("story-time");</script>
</body>
</html>
