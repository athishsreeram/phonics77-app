<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 CVC Words · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.cvc-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:500px; margin:28px auto; }
.cvc-emoji { font-size:clamp(3.5rem,12vw,6rem); display:block; margin-bottom:12px; }
.cvc-slots { display:flex; justify-content:center; gap:12px; margin:20px 0; }
.cvc-slot {
  width:72px; height:84px; border-radius:18px; border:4px solid #e5e7eb; background:#f9fafb;
  font-family:'Fredoka One',cursive; font-size:2.4rem; display:flex; align-items:center; justify-content:center;
  transition:all .2s; cursor:pointer;
}
.cvc-slot.c-slot { border-color:#6bcb77; color:#16a34a; }
.cvc-slot.v-slot { border-color:#ff6b6b; color:#dc2626; }
.cvc-slot.active { transform:scale(1.12); box-shadow:0 6px 16px rgba(0,0,0,.15); }
.label-row { display:flex; justify-content:center; gap:12px; margin-bottom:20px; }
.label-pill { width:72px; text-align:center; font-size:.8rem; font-weight:800; padding:3px 0; border-radius:6px; }
.label-c { background:#dcfce7; color:#15803d; }
.label-v { background:#fee2e2; color:#b91c1c; }
.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.score-badge { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--clr-primary); margin-top:16px; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">CVC Words</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#f59e0b,#d97706)">
  <h1>📝 CVC Words</h1>
  <p>Consonant – Vowel – Consonant patterns</p>
</div>
<main>
<div class="cvc-card" id="cvc-card">
  <p style="font-size:.9rem;font-weight:700;color:var(--clr-text-soft);margin-bottom:8px" id="word-count">Word 1 of 18</p>
  <div class="progress-wrap" style="margin-bottom:20px">
    <div class="progress-bar" id="prog-bar" style="width:5.5%"></div>
  </div>
  <span class="cvc-emoji" id="cvc-emoji">🐱</span>
  <div class="cvc-slots" id="cvc-slots"></div>
  <div class="label-row">
    <div class="label-pill label-c">C</div>
    <div class="label-pill label-v">V</div>
    <div class="label-pill label-c">C</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary btn-lg" id="btn-speak">🔊 Hear Word</button>
    <button class="btn btn-accent" id="btn-next">Next →</button>
  </div>
  <div class="score-badge">⭐ <span id="seen">0</span> seen</div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const WORDS = UI.shuffle(PHONICS_DATA.cvc);
const VOWELS_SET = new Set(['a','e','i','o','u']);
let idx = 0, activeSlot = null;

function loadWord() {
  if (idx >= WORDS.length) { idx = 0; UI.toast('All done! Shuffling... 🔀'); }
  const item = WORDS[idx];
  const letters = item.word.split('');
  document.getElementById('word-count').textContent = `Word ${idx+1} of ${WORDS.length}`;
  document.getElementById('cvc-emoji').textContent = item.emoji;
  UI.updateProgress(document.getElementById('prog-bar'), idx+1, WORDS.length);
  document.getElementById('seen').textContent = idx;
  const slots = document.getElementById('cvc-slots');
  slots.innerHTML = '';
  letters.forEach((ch, i) => {
    const slot = document.createElement('div');
    slot.className = `cvc-slot ${VOWELS_SET.has(ch) ? 'v-slot' : 'c-slot'}`;
    slot.textContent = ch.toUpperCase();
    slot.addEventListener('click', () => { AudioManager.speak(ch, {rate:.7}); slot.classList.add('active'); setTimeout(()=>slot.classList.remove('active'), 400); });
    slots.appendChild(slot);
  });
}

document.getElementById('btn-speak').addEventListener('click', () => { AudioManager.speak(WORDS[idx].word, {rate:.75}); });
document.getElementById('btn-next').addEventListener('click', () => { idx++; loadWord(); });

loadWord();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("cvc-words");</script>
</body>
</html>
