<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 CVC Words · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.cvc-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:500px; margin:28px auto; }
.cvc-emoji { font-size:clamp(3.5rem,12vw,6rem); display:block; margin-bottom:12px; }
.cvc-slots { display:flex; justify-content:center; gap:12px; margin:20px 0; }
.cvc-slot {
  width:72px; height:84px; border-radius:18px; border:4px solid #e5e7eb; background:#f9fafb;
  font-family:'Fredoka One',cursive; font-size:2.4rem; display:flex; align-items:center; justify-content:center;
  transition:all .2s; cursor:pointer;
}
.cvc-slot.c-slot { border-color:#6bcb77; color:#16a34a; }
.cvc-slot.v-slot { border-color:#ff6b6b; color:#dc2626; }
.cvc-slot.blank  { border-color:#f59e0b; background:#fffbeb; color:#f59e0b; font-size:2rem; }
.cvc-slot.active { transform:scale(1.12); box-shadow:0 6px 16px rgba(0,0,0,.15); }
.label-row { display:flex; justify-content:center; gap:12px; margin-bottom:20px; }
.label-pill { width:72px; text-align:center; font-size:.8rem; font-weight:800; padding:3px 0; border-radius:6px; }
.label-c { background:#dcfce7; color:#15803d; }
.label-v { background:#fee2e2; color:#b91c1c; }
.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.score-badge { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--clr-primary); margin-top:16px; }
.mode-toggle { display:flex; gap:8px; justify-content:center; margin-bottom:20px; }
.mode-btn { background:#f3f4f6; border:3px solid #e5e7eb; border-radius:12px; padding:8px 16px; font-weight:800; font-size:.9rem; cursor:pointer; }
.mode-btn.active { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
.vowel-choices { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
.vowel-btn { width:64px; height:64px; border-radius:14px; border:3px solid #e5e7eb; background:#f3f4f6;
  font-family:'Fredoka One',cursive; font-size:1.8rem; cursor:pointer; transition:all .15s; }
.vowel-btn:hover { background:#ffe4e1; border-color:var(--clr-primary); }
.vowel-btn.correct { background:#dcfce7; border-color:var(--clr-green); }
.vowel-btn.wrong   { background:#fee2e2; border-color:var(--clr-primary); }
.mastered-chip { display:inline-block; background:#dcfce7; color:#15803d; border-radius:8px; padding:3px 10px; font-size:.75rem; font-weight:800; margin-left:6px; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">CVC Words</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#f59e0b,#d97706)">
  <h1>📝 CVC Words</h1>
  <p>Consonant – Vowel – Consonant patterns</p>
</div>
<main>
<div class="cvc-card" id="cvc-card">
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-browse">👀 Browse</button>
    <button class="mode-btn" id="mode-quiz">🎯 Quiz</button>
  </div>
  <p style="font-size:.9rem;font-weight:700;color:var(--clr-text-soft);margin-bottom:8px" id="word-count">Word 1 of 18</p>
  <div class="progress-wrap" style="margin-bottom:20px">
    <div class="progress-bar" id="prog-bar" style="width:5.5%"></div>
  </div>
  <span class="cvc-emoji" id="cvc-emoji">🐱</span>
  <div class="cvc-slots" id="cvc-slots"></div>
  <div class="label-row" id="label-row">
    <div class="label-pill label-c">C</div>
    <div class="label-pill label-v">V</div>
    <div class="label-pill label-c">C</div>
  </div>
  <!-- Quiz vowel choices (hidden in browse mode) -->
  <div id="quiz-area" style="display:none">
    <p style="font-weight:800;color:var(--clr-text-soft);margin-bottom:8px">Which vowel completes the word?</p>
    <div class="vowel-choices" id="vowel-choices"></div>
  </div>
  <div class="btn-row" id="browse-btns">
    <button class="btn btn-primary btn-lg" id="btn-speak">🔊 Hear Word</button>
    <button class="btn btn-accent" id="btn-next">Next →</button>
    <button class="btn btn-green btn-sm" id="btn-mastered" style="padding:10px 14px;font-size:.85rem">✅ Mastered</button>
  </div>
  <div class="score-badge">⭐ <span id="seen">0</span> seen · ✅ <span id="mastered-count">0</span> mastered</div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const WORDS = UI.shuffle(PHONICS_DATA.cvc);
const VOWELS_SET = new Set(['a','e','i','o','u']);
const ALL_VOWELS = ['a','e','i','o','u'];
let idx = 0, quizMode = false, quizAnswered = false;
let masteredWords = new Set(JSON.parse(localStorage.getItem('ph_cvc_mastered') || '[]'));

function saveMastered() {
  localStorage.setItem('ph_cvc_mastered', JSON.stringify([...masteredWords]));
  document.getElementById('mastered-count').textContent = masteredWords.size;
}

function loadWord() {
  if (idx >= WORDS.length) { idx = 0; UI.toast('All done! Shuffling 🔀'); }
  quizAnswered = false;
  const item = WORDS[idx];
  const letters = item.word.split('');
  const vowelIdx = letters.findIndex(c => VOWELS_SET.has(c));

  document.getElementById('word-count').textContent = `Word ${idx+1} of ${WORDS.length}`;
  document.getElementById('cvc-emoji').textContent = item.emoji;
  UI.updateProgress(document.getElementById('prog-bar'), idx+1, WORDS.length);
  document.getElementById('seen').textContent = idx;

  const slots = document.getElementById('cvc-slots');
  slots.innerHTML = '';
  letters.forEach((ch, i) => {
    const slot = document.createElement('div');
    const isVowel = VOWELS_SET.has(ch);
    if (quizMode && i === vowelIdx) {
      slot.className = 'cvc-slot blank';
      slot.textContent = '?';
    } else {
      slot.className = `cvc-slot ${isVowel ? 'v-slot' : 'c-slot'}`;
      slot.textContent = ch.toUpperCase();
      slot.addEventListener('click', () => {
        AudioManager.speak(ch, {rate:.7});
        slot.classList.add('active');
        setTimeout(()=>slot.classList.remove('active'), 400);
      });
    }
    slots.appendChild(slot);
  });

  // Quiz mode: show vowel choices
  const quizArea = document.getElementById('quiz-area');
  if (quizMode) {
    quizArea.style.display = 'block';
    document.getElementById('browse-btns').style.display = 'none';
    const correctVowel = letters[vowelIdx];
    const wrongVowels = ALL_VOWELS.filter(v => v !== correctVowel);
    const choices = UI.shuffle([correctVowel, ...UI.shuffle(wrongVowels).slice(0,2)]);
    const vc = document.getElementById('vowel-choices');
    vc.innerHTML = '';
    choices.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'vowel-btn';
      btn.textContent = v.toUpperCase();
      btn.addEventListener('click', () => {
        if (quizAnswered) return;
        quizAnswered = true;
        const correct = v === correctVowel;
        btn.classList.add(correct ? 'correct' : 'wrong');
        if (correct) {
          AudioManager.playTone('correct');
          UI.showFeedback(true);
          // Reveal the blank
          const blankSlot = slots.querySelector('.blank');
          if (blankSlot) { blankSlot.textContent = v.toUpperCase(); blankSlot.className = 'cvc-slot v-slot'; }
          AudioManager.speak(item.word, {rate:.75});
        } else {
          AudioManager.playTone('wrong');
          vc.querySelectorAll('.vowel-btn').forEach(b => { if(b.textContent===correctVowel.toUpperCase()) b.classList.add('correct'); });
        }
        vc.querySelectorAll('.vowel-btn').forEach(b => b.style.pointerEvents='none');
        setTimeout(() => { idx++; loadWord(); }, 1400);
      });
      vc.appendChild(btn);
    });
    AudioManager.speak(item.word.replace(letters[vowelIdx], '___'), {rate:.75});
  } else {
    quizArea.style.display = 'none';
    document.getElementById('browse-btns').style.display = 'flex';
  }

  // Mastered chip
  const wc = document.getElementById('word-count');
  wc.innerHTML = `Word ${idx+1} of ${WORDS.length}${masteredWords.has(item.word)?'<span class="mastered-chip">✅ Mastered</span>':''}`;
}

// Mode toggle
document.getElementById('mode-browse').addEventListener('click', () => {
  quizMode = false;
  document.getElementById('mode-browse').classList.add('active');
  document.getElementById('mode-quiz').classList.remove('active');
  loadWord();
});
document.getElementById('mode-quiz').addEventListener('click', () => {
  quizMode = true;
  document.getElementById('mode-quiz').classList.add('active');
  document.getElementById('mode-browse').classList.remove('active');
  loadWord();
});

document.getElementById('btn-speak').addEventListener('click', () => { AudioManager.speak(WORDS[idx].word, {rate:.75}); });
document.getElementById('btn-next').addEventListener('click', () => { idx++; loadWord(); });
document.getElementById('btn-mastered').addEventListener('click', () => {
  masteredWords.add(WORDS[idx].word);
  saveMastered();
  AudioManager.playTone('star');
  UI.showFeedback(true);
  UI.toast(`✅ ${WORDS[idx].word} mastered!`);
  if (window.CurriculumManager) window.CurriculumManager.markActivityComplete('cvc-words');
  idx++;
  loadWord();
});

saveMastered();
loadWord();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("cvc-words");
window.addEventListener('beforeunload', function() {
  if(typeof analytics!=="undefined") analytics.trackActivityComplete("cvc-words", 0, 18);
  if (window.CurriculumManager) window.CurriculumManager.markActivityComplete('cvc-words');
});</script>
</body>
</html>
