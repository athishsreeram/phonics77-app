<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Diphthongs · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.diphthong-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:520px; margin:28px auto; }
.diphthong-emoji { font-size:clamp(4rem,12vw,6rem); display:block; margin-bottom:12px; }
.diphthong-word { font-family:'Fredoka One',cursive; font-size:clamp(2rem,6vw,2.8rem); color:var(--clr-text); margin:16px 0; font-weight:900; }
.diphthong-hint { font-size:.95rem; font-weight:700; color:var(--clr-text-soft); margin-bottom:24px; }
.quiz-question { font-size:1.1rem; font-weight:800; color:var(--clr-primary); margin:16px 0 20px; }
.choices-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:360px; margin:0 auto 20px; }
.choice-btn {
  background:#f3f4f6; border:3px solid #e5e7eb; border-radius:14px;
  padding:16px 12px; font-family:'Fredoka One',cursive; font-size:1.4rem;
  cursor:pointer; transition:all .2s; font-weight:700;
}
.choice-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-sm); }
.choice-btn.selected { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
.choice-btn.correct { background:#dcfce7; border-color:var(--clr-green); color:#16a34a; }
.choice-btn.wrong { background:#fee2e2; border-color:#dc2626; color:#be123c; }
.progress-info { font-size:.9rem; font-weight:700; color:var(--clr-text-soft); margin:12px 0; }
.score-display { font-family:'Fredoka One',cursive; font-size:1.6rem; color:var(--clr-primary); margin-top:12px; }
.completion-screen { text-align:center; }
.completion-emoji { font-size:5rem; margin:20px 0; }
.completion-text { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--clr-primary); margin:16px 0; }
.completion-score { font-size:1.8rem; font-weight:800; margin:20px 0; }
.btn-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Diphthongs</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#ec4899,#be185d)">
  <h1>🎯 Diphthongs</h1>
  <p>Two vowel sounds in one syllable!</p>
</div>
<main>
<div class="diphthong-card" id="main-card">
  <div class="progress-info" id="progress-info">Question 1 of 10</div>
  <div class="progress-wrap">
    <div class="progress-bar" id="prog-bar" style="width:10%"></div>
  </div>
  <span class="diphthong-emoji" id="emoji">🪙</span>
  <div class="diphthong-word" id="word">coin</div>
  <div class="diphthong-hint" id="hint">Click the speaker icon to hear the word</div>
  <button class="btn btn-primary btn-lg" id="btn-speak" style="margin:12px 0 20px">🔊 Hear Word</button>
  <div class="quiz-question">Which diphthong letters make this word?</div>
  <div class="choices-grid" id="choices"></div>
  <div class="score-display">⭐ <span id="score-txt">0</span>/10</div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn btn-secondary" id="btn-skip" style="display:none">Skip</button>
  </div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const DIPHTHONGS = PHONICS_DATA.diphthongs;
const TOTAL_ROUNDS = 10;
const QUESTIONS = UI.shuffle(DIPHTHONGS).slice(0, TOTAL_ROUNDS);

let currentQ = 0;
let score = 0;
let answered = false;

// Build answer choices - get unique diphthongs from the data
const allLetterPairs = [...new Set(DIPHTHONGS.map(d => d.letters))];

function generateChoices(correctLetters) {
  const choices = [correctLetters];
  // Add 2 random wrong answers (different letter combinations)
  const others = allLetterPairs.filter(x => x !== correctLetters);
  while (choices.length < 3 && others.length > 0) {
    const idx = Math.floor(Math.random() * others.length);
    choices.push(others.splice(idx, 1)[0]);
  }
  return UI.shuffle(choices);
}

function loadQuestion() {
  if (currentQ >= TOTAL_ROUNDS) { showCompletion(); return; }
  answered = false;
  const q = QUESTIONS[currentQ];
  
  document.getElementById('emoji').textContent = q.emoji;
  document.getElementById('word').textContent = q.word;
  document.getElementById('progress-info').textContent = `Question ${currentQ + 1} of ${TOTAL_ROUNDS}`;
  document.getElementById('score-txt').textContent = score;
  UI.updateProgress(document.getElementById('prog-bar'), currentQ + 1, TOTAL_ROUNDS);
  
  // Generate and display choices
  const choices = generateChoices(q.letters);
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.addEventListener('click', () => handleAnswer(btn, choice === q.letters));
    choicesDiv.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;
  
  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score-txt').textContent = score;
    setTimeout(() => {
      currentQ++;
      loadQuestion();
    }, 800);
  } else {
    btn.classList.add('wrong');
    const correct = QUESTIONS[currentQ].letters;
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
    setTimeout(() => {
      currentQ++;
      loadQuestion();
    }, 1200);
  }
}

function showCompletion() {
  const pct = Math.round((score / TOTAL_ROUNDS) * 100);
  const mainCard = document.getElementById('main-card');
  mainCard.innerHTML = `
    <div class="completion-screen">
      <div class="completion-emoji">${pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '💪'}</div>
      <div class="completion-text">Round Complete!</div>
      <div class="completion-score">${score} / ${TOTAL_ROUNDS}</div>
      <p style="font-size:1.1rem;color:var(--clr-text-soft);margin:16px 0">${pct}% correct!</p>
      <div class="btn-row" style="margin-top:24px">
        <button class="btn btn-primary btn-lg" onclick="location.href='index.html'">🏠 Back Home</button>
        <button class="btn btn-secondary" onclick="location.reload()">🔄 Try Again</button>
      </div>
    </div>
  `;
}

document.getElementById('btn-speak').addEventListener('click', () => {
  const word = QUESTIONS[currentQ].word;
  AudioManager.speak(word, {rate: 0.8});
});

// Start activity
loadQuestion();
</script>
<script>
if(typeof analytics!=="undefined") analytics.trackActivityStart("diphthongs");
window.addEventListener('beforeunload', function() {
  if(typeof analytics!=="undefined") {
    analytics.trackActivityComplete("diphthongs", typeof score !== "undefined" ? score : 0, 10);
  }
});
</script>
</body>
</html>
