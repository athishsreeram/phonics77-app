<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔄 Phonics Review · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.review-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:520px; margin:28px auto; }
.category-badge { display:inline-block; background:#e0e7ff; color:#4338ca; border-radius:10px; padding:4px 14px; font-size:.8rem; font-weight:800; margin-bottom:16px; }
.q-display { font-size:clamp(2rem,10vw,4.5rem); font-family:'Fredoka One',cursive; margin:16px 0; color:var(--clr-text); }
.q-emoji   { font-size:clamp(3rem,11vw,5rem); display:block; margin-bottom:8px; }
.choices   { display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:420px; margin:20px auto 0; }
.cbtn { background:#f3f4f6; border:3px solid transparent; border-radius:16px; padding:16px 12px; font-family:'Fredoka One',cursive; font-size:1.5rem; cursor:pointer; transition:all .15s; min-height:70px; display:flex; align-items:center; justify-content:center; }
.cbtn:hover  { background:#e0e7ff; border-color:var(--clr-blue); }
.cbtn.correct { background:#dcfce7; border-color:var(--clr-green); }
.cbtn.wrong   { background:#fee2e2; border-color:var(--clr-primary); }
.score-bar { display:flex; gap:20px; justify-content:center; margin-top:16px; font-weight:800; }
.score-pill { background:#f3f4f6; border-radius:10px; padding:6px 16px; font-size:1rem; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Phonics Review</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#6366f1,#4338ca)">
  <h1>🔄 Phonics Review</h1>
  <p>Mixed questions across all topics!</p>
</div>
<main>
<div class="review-card" id="review-card">
  <div class="category-badge" id="cat-badge">Letters</div>
  <p style="font-size:.9rem;font-weight:700;color:var(--clr-text-soft);margin-bottom:4px" id="q-num">Question 1 of 20</p>
  <div class="progress-wrap" style="margin-bottom:16px">
    <div class="progress-bar" id="prog-bar" style="width:5%"></div>
  </div>
  <span class="q-emoji" id="q-emoji"></span>
  <div class="q-display" id="q-text">Loading…</div>
  <div class="choices" id="choices"></div>
  <div class="score-bar">
    <div class="score-pill">✅ <span id="correct-count">0</span></div>
    <div class="score-pill">❌ <span id="wrong-count">0</span></div>
  </div>
</div>
</main>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const TOTAL = 20;
let qNum = 0, correct = 0, wrong = 0, answered = false;

// Build a mixed question pool
function buildPool() {
  const pool = [];
  // Letter sound questions
  UI.shuffle(PHONICS_DATA.alphabet).slice(0,7).forEach(l => {
    pool.push({
      category:'Letters', emoji:'', text:`What sound does "${l.l}" make?`,
      answer: l.sound,
      options: UI.shuffle(PHONICS_DATA.alphabet.filter(x=>x.l!==l.l)).slice(0,3).map(x=>x.sound).concat(l.sound),
    });
  });
  // Digraph questions
  UI.shuffle(PHONICS_DATA.digraphs).slice(0,5).forEach(d => {
    pool.push({
      category:'Digraphs', emoji: d.emoji, text:`"${d.word}" starts with which digraph?`,
      answer: d.pair,
      options: UI.shuffle(PHONICS_DATA.digraphs.filter(x=>x.pair!==d.pair)).slice(0,3).map(x=>x.pair).concat(d.pair),
    });
  });
  // CVC word questions
  UI.shuffle(PHONICS_DATA.cvc).slice(0,5).forEach(w => {
    pool.push({
      category:'CVC Words', emoji: w.emoji, text:`What word matches this picture?`,
      answer: w.word,
      options: UI.shuffle(PHONICS_DATA.cvc.filter(x=>x.word!==w.word)).slice(0,3).map(x=>x.word).concat(w.word),
    });
  });
  // Blend questions
  UI.shuffle(PHONICS_DATA.consonantBlends).slice(0,3).forEach(b => {
    pool.push({
      category:'Blends', emoji: b.emoji, text:`"${b.word}" starts with which blend?`,
      answer: b.blend.toUpperCase(),
      options: UI.shuffle(PHONICS_DATA.consonantBlends.filter(x=>x.blend!==b.blend)).slice(0,3).map(x=>x.blend.toUpperCase()).concat(b.blend.toUpperCase()),
    });
  });
  return UI.shuffle(pool).slice(0, TOTAL);
}

const POOL = buildPool();

function loadQ() {
  if (qNum >= TOTAL) { endGame(); return; }
  answered = false;
  const q = POOL[qNum];
  document.getElementById('cat-badge').textContent  = q.category;
  document.getElementById('q-num').textContent      = `Question ${qNum+1} of ${TOTAL}`;
  document.getElementById('q-emoji').textContent    = q.emoji;
  document.getElementById('q-text').textContent     = q.text;
  UI.updateProgress(document.getElementById('prog-bar'), qNum+1, TOTAL);

  if (q.emoji) AudioManager.speak(q.answer, {rate:.75});

  const ch = document.getElementById('choices');
  ch.innerHTML = '';
  UI.shuffle(q.options).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'cbtn'; btn.textContent = opt;
    btn.addEventListener('click', () => {
      if (answered) return; answered = true;
      const isRight = opt === q.answer;
      btn.classList.add(isRight ? 'correct' : 'wrong');
      if (isRight) { correct++; AudioManager.playTone('correct'); UI.showFeedback(true); }
      else { wrong++; AudioManager.playTone('wrong'); UI.showFeedback(false); ch.querySelectorAll('.cbtn').forEach(b=>{ if(b.textContent===q.answer) b.classList.add('correct'); }); }
      document.getElementById('correct-count').textContent = correct;
      document.getElementById('wrong-count').textContent   = wrong;
      ch.querySelectorAll('.cbtn').forEach(b => b.style.pointerEvents='none');
      qNum++; setTimeout(loadQ, 1400);
    });
    ch.appendChild(btn);
  });
}

function endGame() {
  const pct = Math.round((correct/TOTAL)*100);
  document.getElementById('review-card').innerHTML = `
    <div style="font-size:4rem;margin-bottom:16px">${pct>=80?'🏆':pct>=60?'⭐':'💪'}</div>
    <h2 style="font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:8px">${pct>=80?'Excellent!':pct>=60?'Good work!':'Keep practising!'}</h2>
    <p style="font-size:1.2rem;color:#666;margin-bottom:24px">Score: ${correct}/${TOTAL} (${pct}%)</p>
    <button class="btn btn-primary btn-lg" onclick="location.reload()">🔄 Try Again</button>
    <br><br><a href="index.html" class="btn btn-secondary">🏠 Home</a>`;
  UI.setScore('phonics-review', {stars:correct, total:TOTAL});
}

loadQ();
</script>
</body>
</html>
