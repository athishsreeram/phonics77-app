<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Sight Words · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.sw-card { background:white; border-radius:28px; padding:40px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:480px; margin:28px auto; }
.sw-word { font-family:'Fredoka One',cursive; font-size:clamp(3rem,14vw,7rem); color:var(--clr-primary); line-height:1; margin:16px 0; }
.sw-index { font-size:.9rem; font-weight:700; color:var(--clr-text-soft); }
.btn-row  { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:24px; }
.thumbs   { display:flex; gap:20px; justify-content:center; margin-top:20px; }
.thumb-btn { background:#f3f4f6; border:3px solid transparent; border-radius:16px; padding:14px 20px; font-size:1.6rem; cursor:pointer; transition:all .15s; }
.thumb-btn:hover { transform:scale(1.1); }
.thumb-btn.know  { background:#dcfce7; border-color:var(--clr-green); }
.thumb-btn.learn { background:#fee2e2; border-color:var(--clr-primary); }
.stats-row { display:flex; gap:16px; justify-content:center; margin-top:20px; font-weight:700; font-size:.95rem; }
.stat-pill { background:#f3f4f6; border-radius:10px; padding:6px 14px; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Sight Words</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#f59e0b,#b45309)">
  <h1>⭐ Sight Words</h1>
  <p>High-frequency words every reader needs!</p>
</div>
<main>
<div class="sw-card">
  <p class="sw-index" id="sw-index">Word 1 of 50</p>
  <div class="progress-wrap" style="margin:12px 0 20px">
    <div class="progress-bar" id="sw-bar" style="width:2%"></div>
  </div>
  <div class="sw-word" id="sw-word">the</div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-speak">🔊 Say It</button>
    <button class="btn btn-secondary" id="btn-spell">🔤 Spell It</button>
  </div>
  <div class="thumbs">
    <button class="thumb-btn know"  id="btn-know"  title="I know this!">✅ Know it!</button>
    <button class="thumb-btn learn" id="btn-learn" title="Still learning">📚 Learning</button>
  </div>
  <div class="stats-row">
    <div class="stat-pill">✅ Known: <span id="known-count">0</span></div>
    <div class="stat-pill">📚 Learning: <span id="learn-count">0</span></div>
  </div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const WORDS = UI.shuffle([...PHONICS_DATA.sightWords]).slice(0, 50);
let idx = 0, known = 0, learning = 0;

function loadWord() {
  if (idx >= WORDS.length) { endGame(); return; }
  const w = WORDS[idx];
  document.getElementById('sw-word').textContent  = w;
  document.getElementById('sw-index').textContent = `Word ${idx+1} of ${WORDS.length}`;
  UI.updateProgress(document.getElementById('sw-bar'), idx+1, WORDS.length);
  AudioManager.speak(w, {rate:.75});
}

document.getElementById('btn-speak').addEventListener('click', () => AudioManager.speak(WORDS[idx], {rate:.7}));
document.getElementById('btn-spell').addEventListener('click', () => {
  const spelled = WORDS[idx].split('').join(', ');
  AudioManager.speak(spelled, {rate:.6});
});
document.getElementById('btn-know').addEventListener('click', () => { known++; document.getElementById('known-count').textContent = known; AudioManager.playTone('correct'); UI.showFeedback(true); idx++; loadWord(); });
document.getElementById('btn-learn').addEventListener('click', () => { learning++; document.getElementById('learn-count').textContent = learning; idx++; loadWord(); });

function endGame() {
  document.querySelector('main').innerHTML = `
    <div class="sw-card">
      <div style="font-size:4rem;margin-bottom:16px">🏆</div>
      <h2 style="font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:8px">All done!</h2>
      <p style="font-size:1.1rem;color:#666;margin-bottom:24px">You know <strong>${known}</strong> sight words!</p>
      <button class="btn btn-primary btn-lg" onclick="location.reload()">🔄 Try Again</button>
      <br><br><a href="index.html" class="btn btn-secondary">🏠 Home</a>
    </div>`;
  UI.setScore('sight-words', {stars: known, total: WORDS.length});
  if(typeof analytics!=='undefined') analytics.trackActivityComplete('sight-words', known, WORDS.length);
  try {
    if (window.CurriculumManager) {
      const first = CurriculumManager.markActivityComplete('sight-words');
      if (first && window.analytics && analytics.showEmailCapture) analytics.showEmailCapture('first_win');
    }
  } catch (e) { console.warn('Curriculum mark failed', e); }
}

loadWord();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("sight-words");</script>
</body>
</html>
