<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>📊 Word Explorer · Phonics Hub</title><link rel="stylesheet" href="css/shared.css">
<style>.explorer-card{background:white;border-radius:28px;padding:32px 20px;box-shadow:var(--shadow-md);max-width:560px;margin:28px auto}.builder-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:20px 0}.letter-btn{width:58px;height:64px;border-radius:14px;background:#f3f4f6;border:3px solid #e5e7eb;font-family:'Fredoka One',cursive;font-size:1.6rem;cursor:pointer;transition:all .15s}.letter-btn:hover{background:#e0e7ff;border-color:var(--clr-blue);transform:translateY(-2px)}.word-out{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,10vw,4rem);min-height:80px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;color:var(--clr-primary)}.built-letter{background:var(--clr-primary);color:white;width:56px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;animation:pop .2s ease}.btn-row{display:flex;gap:10px;justify-content:center;margin-top:16px}.valid-word{font-size:.85rem;font-weight:800;padding:4px 12px;border-radius:8px;margin-top:8px;display:inline-block}</style>
</head><body>
<nav class="top-nav"><div class="nav-left"><a href="index.html" class="nav-home-btn">🏠</a><span class="nav-title">Word Explorer</span></div></nav>
<div class="page-header" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)"><h1>📊 Word Explorer</h1><p>Build words letter by letter!</p></div>
<main><div class="explorer-card">
  <p style="text-align:center;font-weight:700;color:var(--clr-text-soft);margin-bottom:16px">Tap letters to build a word, then press Hear!</p>
  <div class="word-out" id="word-out"><span style="color:#ccc;font-size:1.5rem">tap letters…</span></div>
  <div id="word-check" style="text-align:center;min-height:28px"></div>
  <div class="btn-row" style="margin-bottom:20px">
    <button class="btn btn-primary" id="btn-hear">🔊 Hear Word</button>
    <button class="btn btn-secondary" id="btn-clear">🗑 Clear</button>
  </div>
  <div class="builder-row" id="builder-row"></div>
</div></main>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/analytics.js"></script><script src="js/audio.js"></script><script src="js/materials.js"></script><script src="js/ui.js"></script>
<script>
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let built=[];
// Known word list for validation
const KNOWN_WORDS=new Set([...PHONICS_DATA.cvc.map(x=>x.word),...PHONICS_DATA.sightWords,...PHONICS_DATA.magicE.map(x=>x.cvc),...PHONICS_DATA.magicE.map(x=>x.magic)]);
const row=document.getElementById('builder-row');
LETTERS.forEach(l=>{const btn=document.createElement('button');btn.className='letter-btn';btn.textContent=l;btn.addEventListener('click',()=>{built.push(l);render();AudioManager.speak(l,{rate:.7});});row.appendChild(btn);});
function render(){const out=document.getElementById('word-out');const check=document.getElementById('word-check');if(!built.length){out.innerHTML=`<span style="color:#ccc;font-size:1.5rem">tap letters…</span>`;check.innerHTML='';return;}out.innerHTML=built.map(l=>`<div class="built-letter">${l}</div>`).join('');const word=built.join('').toLowerCase();if(built.length>=2){if(KNOWN_WORDS.has(word)){check.innerHTML=`<span class="valid-word" style="background:#dcfce7;color:#15803d">✅ Real word!</span>`;}else{check.innerHTML=`<span class="valid-word" style="background:#f3f4f6;color:#888">🤔 Keep going or try another</span>`;}}else{check.innerHTML='';}}
document.getElementById('btn-hear').addEventListener('click',()=>{if(!built.length){UI.toast('Add some letters first!');return;}AudioManager.speak(built.join('').toLowerCase(),{rate:.7});});
document.getElementById('btn-clear').addEventListener('click',()=>{built=[];render();});
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("word-explorer");window.addEventListener('beforeunload',function(){if(typeof analytics!=="undefined")analytics.trackActivityComplete("word-explorer",0,26);});</script>
</body></html>
