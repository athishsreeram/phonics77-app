<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Word Explorer · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.explorer-card { background:white; border-radius:28px; padding:32px 20px; box-shadow:var(--shadow-md); max-width:560px; margin:28px auto; }
.builder-row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:20px 0; }
.letter-btn { width:58px; height:64px; border-radius:14px; background:#f3f4f6; border:3px solid #e5e7eb; font-family:'Fredoka One',cursive; font-size:1.6rem; cursor:pointer; transition:all .15s; }
.letter-btn:hover { background:#e0e7ff; border-color:var(--clr-blue); transform:translateY(-2px); }
.word-out { font-family:'Fredoka One',cursive; font-size:clamp(2.5rem,10vw,4rem); min-height:80px; display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; color:var(--clr-primary); }
.built-letter { background:var(--clr-primary); color:white; width:56px; height:64px; border-radius:14px; display:flex; align-items:center; justify-content:center; animation:pop .2s ease; }
.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Word Explorer</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">
  <h1>📊 Word Explorer</h1>
  <p>Build words letter by letter!</p>
</div>
<main>
<div class="explorer-card">
  <p style="text-align:center;font-weight:700;color:var(--clr-text-soft);margin-bottom:16px">Tap letters to build a word, then press Hear!</p>
  <div class="word-out" id="word-out"><span style="color:#ccc;font-size:1.5rem">tap letters…</span></div>
  <div class="btn-row" style="margin-bottom:20px">
    <button class="btn btn-primary" id="btn-hear">🔊 Hear Word</button>
    <button class="btn btn-secondary" id="btn-clear">🗑 Clear</button>
  </div>
  <div class="builder-row" id="builder-row"></div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script>
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let built = [];

const row = document.getElementById('builder-row');
LETTERS.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'letter-btn'; btn.textContent = l;
  btn.addEventListener('click', () => {
    built.push(l);
    render();
    AudioManager.speak(l, {rate:.7});
  });
  row.appendChild(btn);
});

function render() {
  const out = document.getElementById('word-out');
  if (!built.length) { out.innerHTML = `<span style="color:#ccc;font-size:1.5rem">tap letters…</span>`; return; }
  out.innerHTML = built.map(l => `<div class="built-letter">${l}</div>`).join('');
}

document.getElementById('btn-hear').addEventListener('click', () => {
  if (!built.length) { UI.toast('Add some letters first!'); return; }
  AudioManager.speak(built.join('').toLowerCase(), {rate:.7});
});
document.getElementById('btn-clear').addEventListener('click', () => { built=[]; render(); });
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("word-explore");</script>
</body>
</html>
