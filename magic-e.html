<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤫 Magic E · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.magic-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:520px; margin:28px auto; }
.transform-row { display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap; margin:20px 0; }
.word-box { text-align:center; }
.word-big { font-family:'Fredoka One',cursive; font-size:clamp(2.4rem,10vw,4.5rem); line-height:1; }
.word-emoji { font-size:clamp(2.5rem,9vw,4rem); display:block; margin-bottom:6px; }
.arrow-box { font-size:2.5rem; color:var(--clr-text-soft); }
.magic-e-highlight { color:var(--clr-primary); font-size:clamp(2.8rem,11vw,5rem); }
.vowel-highlight { color:#667eea; background:#eef2ff; border-radius:6px; padding:0 2px; }
.label { font-size:.8rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--clr-text-soft); margin-top:4px; }
.btn-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
.nav-info { font-size:.9rem; font-weight:700; color:var(--clr-text-soft); margin-bottom:8px; }
/* Quiz styles */
.quiz-overlay { background:#f9fafb; border-radius:20px; padding:24px; margin-top:16px; border:3px solid var(--clr-secondary); }
.quiz-q { font-weight:800; font-size:1.1rem; margin-bottom:16px; }
.quiz-choices { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.quiz-btn { background:#f3f4f6; border:3px solid transparent; border-radius:14px; padding:12px 20px;
  font-family:'Fredoka One',cursive; font-size:1.4rem; cursor:pointer; transition:all .15s; }
.quiz-btn.correct { background:#dcfce7; border-color:var(--clr-green); }
.quiz-btn.wrong   { background:#fee2e2; border-color:var(--clr-primary); }
.quiz-score { font-size:.9rem; font-weight:700; color:var(--clr-text-soft); margin-top:12px; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Magic E</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#8b5cf6,#6d28d9)">
  <h1>🤫 Magic E</h1>
  <p>Silent E changes the vowel sound!</p>
</div>
<main>
<div class="magic-card">
  <p class="nav-info" id="nav-info">Pair 1 of 8</p>
  <div class="progress-wrap" style="margin-bottom:20px">
    <div class="progress-bar" id="prog-bar" style="width:12.5%"></div>
  </div>
  <div class="transform-row">
    <div class="word-box">
      <span class="word-emoji" id="emoji1">🧢</span>
      <div class="word-big" id="cvc-word" style="color:#22c55e">cap</div>
      <div class="label">Short vowel</div>
    </div>
    <div class="arrow-box">→ + E →</div>
    <div class="word-box">
      <span class="word-emoji" id="emoji2">🦸</span>
      <div class="word-big" id="magic-word" style="color:var(--clr-primary)">cap<span class="magic-e-highlight">e</span></div>
      <div class="label">Long vowel!</div>
    </div>
  </div>
  <div style="background:#eef2ff;border-radius:12px;padding:10px 16px;font-size:.9rem;font-weight:700;color:#4338ca;margin-bottom:16px" id="vowel-tip">
    💡 The vowel <strong id="vowel-letter">A</strong> goes from short <em>"aah"</em> → long <em>"ay"</em> with magic E!
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-say1">🔊 Say "<span id="lbl1">cap</span>"</button>
    <button class="btn btn-primary" id="btn-say2">🔊 Say "<span id="lbl2">cape</span>"</button>
    <button class="btn btn-accent" id="btn-both">🔊 Both</button>
  </div>
  <div class="btn-row" style="margin-top:12px">
    <button class="btn btn-secondary" id="btn-prev">← Prev</button>
    <button class="btn btn-green" id="btn-next">Next →</button>
  </div>

  <!-- Quiz shown every 3 pairs -->
  <div class="quiz-overlay" id="quiz-overlay" style="display:none">
    <div class="quiz-q" id="quiz-q">Add magic E to "cap" — what's the new word?</div>
    <div class="quiz-choices" id="quiz-choices"></div>
    <div class="quiz-score">Quiz score: <span id="qscore">0</span>/<span id="qtotal">0</span></div>
  </div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const PAIRS = PHONICS_DATA.magicE;
const VOWEL_SOUNDS = { a:['aah','ay'], i:['ih','eye'], o:['oh','oh (long)'], u:['uh','yoo'], e:['eh','ee'] };
let idx = 0, qscore = 0, qtotal = 0;

function getVowel(word) {
  for (const c of word) if ('aeiou'.includes(c)) return c;
  return 'a';
}

function render() {
  const p = PAIRS[idx];
  const vowel = getVowel(p.cvc);
  const sounds = VOWEL_SOUNDS[vowel] || ['short','long'];

  document.getElementById('nav-info').textContent   = `Pair ${idx+1} of ${PAIRS.length}`;
  document.getElementById('emoji1').textContent     = p.emoji1;
  document.getElementById('emoji2').textContent     = p.emoji2;

  // Highlight vowel in CVC word
  document.getElementById('cvc-word').innerHTML =
    p.cvc.replace(vowel, `<span class="vowel-highlight">${vowel}</span>`);

  // Highlight vowel + magic E in magic word
  const magicBase = p.magic.slice(0,-1);
  document.getElementById('magic-word').innerHTML =
    magicBase.replace(vowel, `<span class="vowel-highlight">${vowel}</span>`) +
    `<span class="magic-e-highlight">e</span>`;

  document.getElementById('lbl1').textContent = p.cvc;
  document.getElementById('lbl2').textContent = p.magic;
  document.getElementById('vowel-letter').textContent = vowel.toUpperCase();
  document.getElementById('vowel-tip').innerHTML =
    `💡 The vowel <strong>${vowel.toUpperCase()}</strong> goes from short <em>"${sounds[0]}"</em> → long <em>"${sounds[1]}"</em> with magic E!`;

  UI.updateProgress(document.getElementById('prog-bar'), idx+1, PAIRS.length);

  // Show quiz every 3 pairs
  if ((idx + 1) % 3 === 0) {
    showQuiz();
  } else {
    document.getElementById('quiz-overlay').style.display = 'none';
  }
}

function showQuiz() {
  const p = PAIRS[idx];
  const overlay = document.getElementById('quiz-overlay');
  overlay.style.display = 'block';
  document.getElementById('quiz-q').textContent = `Add magic E to "${p.cvc}" — what's the new word?`;

  // Wrong options: other magic words from pool
  const wrongs = UI.shuffle(PAIRS.filter((_,i)=>i!==idx)).slice(0,2).map(x=>x.magic);
  const opts = UI.shuffle([p.magic, ...wrongs]);
  const qc = document.getElementById('quiz-choices');
  qc.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-btn'; btn.textContent = opt;
    btn.addEventListener('click', () => {
      qtotal++;
      const correct = opt === p.magic;
      btn.classList.add(correct ? 'correct' : 'wrong');
      if (correct) { qscore++; AudioManager.playTone('correct'); UI.showFeedback(true); }
      else { AudioManager.playTone('wrong'); qc.querySelectorAll('.quiz-btn').forEach(b=>{ if(b.textContent===p.magic) b.classList.add('correct'); }); }
      document.getElementById('qscore').textContent = qscore;
      document.getElementById('qtotal').textContent = qtotal;
      qc.querySelectorAll('.quiz-btn').forEach(b => b.style.pointerEvents='none');
    });
    qc.appendChild(btn);
  });
}

document.getElementById('btn-say1').addEventListener('click', () => AudioManager.speak(PAIRS[idx].cvc,  {rate:.75}));
document.getElementById('btn-say2').addEventListener('click', () => AudioManager.speak(PAIRS[idx].magic,{rate:.75}));
document.getElementById('btn-both').addEventListener('click', () => {
  const p = PAIRS[idx];
  AudioManager.speak(`${p.cvc}... ${p.magic}`, {rate:.7});
});
document.getElementById('btn-prev').addEventListener('click', () => { idx=(idx-1+PAIRS.length)%PAIRS.length; render(); });
document.getElementById('btn-next').addEventListener('click', () => { idx=(idx+1)%PAIRS.length; render(); });

render();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("silent-e-words");
window.addEventListener('beforeunload', function() {
  if(typeof analytics!=="undefined") analytics.trackActivityComplete("silent-e-words", 0, 8);
});</script>
</body>
</html>
