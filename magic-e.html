<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤫 Magic E · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.magic-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:520px; margin:28px auto; }
.transform-row { display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap; margin:20px 0; }
.word-box { text-align:center; }
.word-big { font-family:'Fredoka One',cursive; font-size:clamp(2.4rem,10vw,4.5rem); line-height:1; }
.word-emoji { font-size:clamp(2.5rem,9vw,4rem); display:block; margin-bottom:6px; }
.arrow-box { font-size:2.5rem; color:var(--clr-text-soft); }
.magic-e-highlight { color:var(--clr-primary); font-size:clamp(2.8rem,11vw,5rem); }
.label { font-size:.8rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--clr-text-soft); margin-top:4px; }
.btn-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
.nav-info { font-size:.9rem; font-weight:700; color:var(--clr-text-soft); margin-bottom:8px; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Magic E</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#8b5cf6,#6d28d9)">
  <h1>🤫 Magic E</h1>
  <p>The silent E changes the vowel sound!</p>
</div>
<main>
<div class="magic-card">
  <p class="nav-info" id="nav-info">Pair 1 of 8</p>
  <div class="progress-wrap" style="margin-bottom:20px">
    <div class="progress-bar" id="prog-bar" style="width:12.5%"></div>
  </div>
  <div class="transform-row">
    <div class="word-box">
      <span class="word-emoji" id="emoji1">🧢</span>
      <div class="word-big" id="cvc-word" style="color:#22c55e">cap</div>
      <div class="label">Short vowel</div>
    </div>
    <div class="arrow-box">→ + E →</div>
    <div class="word-box">
      <span class="word-emoji" id="emoji2">🦸</span>
      <div class="word-big" id="magic-word" style="color:var(--clr-primary)">cap<span class="magic-e-highlight">e</span></div>
      <div class="label">Long vowel!</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-say1">🔊 Say "<span id="lbl1">cap</span>"</button>
    <button class="btn btn-primary" id="btn-say2">🔊 Say "<span id="lbl2">cape</span>"</button>
    <button class="btn btn-accent" id="btn-both">🔊 Both</button>
  </div>
  <div class="btn-row" style="margin-top:12px">
    <button class="btn btn-secondary" id="btn-prev">← Prev</button>
    <button class="btn btn-green" id="btn-next">Next →</button>
  </div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const PAIRS = PHONICS_DATA.magicE;
let idx = 0;

function render() {
  const p = PAIRS[idx];
  document.getElementById('nav-info').textContent   = `Pair ${idx+1} of ${PAIRS.length}`;
  document.getElementById('emoji1').textContent     = p.emoji1;
  document.getElementById('emoji2').textContent     = p.emoji2;
  document.getElementById('cvc-word').innerHTML     = p.cvc;
  document.getElementById('magic-word').innerHTML   = `${p.magic.slice(0,-1)}<span class="magic-e-highlight">e</span>`;
  document.getElementById('lbl1').textContent       = p.cvc;
  document.getElementById('lbl2').textContent       = p.magic;
  UI.updateProgress(document.getElementById('prog-bar'), idx+1, PAIRS.length);
}

document.getElementById('btn-say1').addEventListener('click', () => AudioManager.speak(PAIRS[idx].cvc,  {rate:.75}));
document.getElementById('btn-say2').addEventListener('click', () => AudioManager.speak(PAIRS[idx].magic,{rate:.75}));
document.getElementById('btn-both').addEventListener('click', () => {
  const p = PAIRS[idx];
  AudioManager.speak(`${p.cvc}... ${p.magic}`, {rate:.7});
});
document.getElementById('btn-prev').addEventListener('click', () => { idx=(idx-1+PAIRS.length)%PAIRS.length; render(); });
document.getElementById('btn-next').addEventListener('click', () => { idx=(idx+1)%PAIRS.length; render(); });

render();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("silent-e-words");
window.addEventListener('beforeunload', function() {
  if(typeof analytics!=="undefined") {
    var s = typeof score!=="undefined" ? score : 0;
    var t = typeof total!=="undefined" ? total : 10;
    analytics.trackActivityComplete("silent-e-words", s, t);
    try { if (window.CurriculumManager) CurriculumManager.markActivityComplete('silent-e-words'); } catch(e){}
  }
});</script>
</body>
</html>
