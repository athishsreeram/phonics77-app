<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧 Parent Dashboard · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.dash-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:32px; }
.stat-card  { background:white; border-radius:20px; padding:22px 18px; box-shadow:var(--shadow-sm); text-align:center; }
.stat-big   { font-family:'Fredoka One',cursive; font-size:2.6rem; line-height:1; }
.stat-lbl   { font-size:.85rem; font-weight:700; color:var(--clr-text-soft); margin-top:4px; }
.activity-row { display:flex; align-items:center; justify-content:space-between; background:white; border-radius:14px; padding:14px 18px; margin-bottom:10px; box-shadow:var(--shadow-sm); }
.act-name   { font-weight:800; font-size:.95rem; }
.act-score  { font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--clr-primary); }
.section-head { font-family:'Fredoka One',cursive; font-size:1.3rem; margin:28px 0 12px; color:#444; }
.bar-wrap    { height:10px; background:#e5e7eb; border-radius:999px; flex:1; margin:0 12px; overflow:hidden; }
.bar-fill    { height:100%; background:linear-gradient(90deg,var(--clr-accent),var(--clr-primary)); border-radius:999px; transition:width .5s; }
.empty-state { text-align:center; padding:40px 20px; color:var(--clr-text-soft); }
.empty-state div { font-size:4rem; margin-bottom:12px; }
.reset-btn { background:none; border:2px solid #e5e7eb; border-radius:10px; padding:8px 16px; font-size:.85rem; font-weight:700; cursor:pointer; color:var(--clr-text-soft); transition:all .2s; }
.reset-btn:hover { border-color:var(--clr-primary); color:var(--clr-primary); }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Parent Dashboard</span>
  </div>
  <div class="nav-right">
    <button class="reset-btn" id="btn-reset">🗑 Clear Data</button>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#0f172a,#1e3a5f)">
  <h1>👨‍👩‍👧 Parent Dashboard</h1>
  <p>Track your child's phonics progress</p>
</div>
<main style="margin-top:24px">
  <div class="dash-grid" id="summary-grid"></div>
  <div class="section-head">📊 Activity Progress</div>
  <div id="activity-list"></div>
  <div class="section-head">🔤 Alphabet Mastery</div>
  <div id="alpha-detail"></div>
</main>
<script src="js/ui.js"></script>
<script>
const ACTIVITIES = [
  {key:'sound-matching',   label:'Sound Matching',      total:10},
  {key:'alphabet',         label:'Alphabet A–Z',         total:26},
  {key:'blending-intro',   label:'Blending Intro',       total:10},
  {key:'digraph-practice', label:'Digraph Practice',     total:8 },
  {key:'vowel-blends',     label:'Vowel Blends',         total:10},
  {key:'cvc-words',        label:'CVC Words',            total:18},
  {key:'sight-words',      label:'Sight Words',          total:50},
  {key:'word-match',       label:'Word Match',           total:12},
  {key:'word-explore',     label:'Word Explorer',        total:26},
  {key:'phonics-review',   label:'Phonics Review',       total:20},
  {key:'alphabet-balloon', label:'Balloon Pop',          total:20},
];

function loadData() {
  let totalStars=0, totalActivities=0, totalPossible=0;
  const rows = [];
  ACTIVITIES.forEach(a => {
    const s = UI.getScore(a.key);
    const stars = s.stars || 0;
    const total = s.total || a.total;
    const pct   = total > 0 ? Math.round((stars/total)*100) : 0;
    if (stars > 0) { totalStars += stars; totalActivities++; }
    totalPossible += total;
    rows.push({label:a.label, stars, total, pct});
  });

  // Summary cards
  const grid = document.getElementById('summary-grid');
  grid.innerHTML='';
  const summary = [
    {num:totalActivities, lbl:'Activities played', color:'#6366f1'},
    {num:totalStars,      lbl:'Total stars earned', color:'#f59e0b'},
    {num:Math.round((totalStars/Math.max(totalPossible,1))*100)+'%', lbl:'Overall score', color:'#22c55e'},
    {num:JSON.parse(localStorage.getItem('alpha_mastered')||'[]').length, lbl:'Letters mastered', color:'#ec4899'},
  ];
  summary.forEach(s => {
    const card = document.createElement('div');
    card.className='stat-card';
    card.innerHTML=`<div class="stat-big" style="color:${s.color}">${s.num}</div><div class="stat-lbl">${s.lbl}</div>`;
    grid.appendChild(card);
  });

  // Activity rows
  const list = document.getElementById('activity-list');
  const hasData = rows.some(r => r.stars > 0);
  if (!hasData) {
    list.innerHTML='<div class="empty-state"><div>📭</div><p>No activity data yet.<br>Complete some activities to see progress here!</p></div>';
  } else {
    list.innerHTML='';
    rows.forEach(r => {
      if (r.stars === 0) return;
      const row = document.createElement('div');
      row.className='activity-row';
      row.innerHTML=`
        <span class="act-name">${r.label}</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${r.pct}%"></div></div>
        <span class="act-score">${r.stars}/${r.total}</span>`;
      list.appendChild(row);
    });
  }

  // Alphabet detail
  const mastered = new Set(JSON.parse(localStorage.getItem('alpha_mastered')||'[]'));
  const alphaDiv = document.getElementById('alpha-detail');
  if (mastered.size === 0) {
    alphaDiv.innerHTML='<div class="empty-state"><div>🔤</div><p>No letters mastered yet in Alphabet A–Z.</p></div>';
  } else {
    alphaDiv.innerHTML=`<p style="font-weight:700;color:var(--clr-text-soft);margin-bottom:12px">${mastered.size}/26 letters mastered</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>`<div style="width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.2rem;background:${mastered.has(l)?'#dcfce7':'#f3f4f6'};color:${mastered.has(l)?'#15803d':'#999'};border:2px solid ${mastered.has(l)?'#22c55e':'transparent'}">${l}</div>`).join('')}</div>`;
  }
}

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Clear all activity progress? This cannot be undone.')) return;
  ACTIVITIES.forEach(a => localStorage.removeItem(`ph_score_${a.key}`));
  localStorage.removeItem('alpha_mastered');
  localStorage.removeItem('ph_premium');
  loadData();
  alert('All data cleared.');
});

loadData();
</script>
</body>
</html>
