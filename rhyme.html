<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧‍👦 Word Families · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.family-tabs { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
.tab-btn { background:#f3f4f6; border:3px solid transparent; border-radius:12px; padding:10px 18px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all .2s; }
.tab-btn.active { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
.family-card { background:white; border-radius:24px; padding:28px 20px; box-shadow:var(--shadow-md); text-align:center; }
.family-header { font-family:'Fredoka One',cursive; font-size:3rem; color:var(--clr-primary); margin-bottom:20px; }
.words-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:12px; }
.word-tile {
  background:#f9fafb; border:3px solid #e5e7eb; border-radius:14px; padding:14px 8px;
  font-family:'Fredoka One',cursive; font-size:1.4rem; cursor:pointer; text-align:center;
  transition:all .15s;
}
.word-tile:hover  { background:#e0e7ff; border-color:var(--clr-blue); transform:translateY(-2px); }
.word-tile:active { transform:scale(.95); }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Word Families</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#f97316,#c2410c)">
  <h1>👨‍👩‍👧‍👦 Word Families</h1>
  <p>Words that rhyme share the same ending!</p>
</div>
<main>
  <div class="family-tabs" id="tabs"></div>
  <div class="family-card" id="family-card">
    <div class="family-header" id="family-header">-at family</div>
    <div class="words-grid" id="words-grid"></div>
    <div style="margin-top:20px">
      <button class="btn btn-primary" id="btn-all">🔊 Say All</button>
    </div>
  </div>
</main>
<script src="js/config.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const FAMILIES = PHONICS_DATA.rhymes;
let cur = 0;

function renderFamily() {
  const f = FAMILIES[cur];
  document.getElementById('family-header').textContent = `-${f.family} family`;
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', i===cur));
  const grid = document.getElementById('words-grid');
  grid.innerHTML = '';
  f.words.forEach(w => {
    const tile = document.createElement('div');
    tile.className = 'word-tile';
    tile.innerHTML = w.slice(0,-f.family.length) + `<span style="color:var(--clr-primary)">${f.family}</span>`;
    tile.addEventListener('click', () => { AudioManager.speak(w, {rate:.75}); AudioManager.playTone('click'); });
    grid.appendChild(tile);
  });
}

const tabs = document.getElementById('tabs');
FAMILIES.forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = `tab-btn ${i===0?'active':''}`;
  btn.textContent = `-${f.family}`;
  btn.addEventListener('click', () => { cur = i; renderFamily(); });
  tabs.appendChild(btn);
});

document.getElementById('btn-all').addEventListener('click', () => {
  const words = FAMILIES[cur].words;
  let i = 0;
  function next() { if(i>=words.length) return; AudioManager.speak(words[i++], {rate:.8, onEnd:()=>setTimeout(next,300)}); }
  next();
});

renderFamily();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("word-families");</script>
</body>
</html>
