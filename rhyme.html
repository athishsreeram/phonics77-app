<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧‍👦 Word Families · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.family-tabs { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
.tab-btn { background:#f3f4f6; border:3px solid transparent; border-radius:12px; padding:10px 18px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all .2s; }
.tab-btn.active { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
.family-card { background:white; border-radius:24px; padding:28px 20px; box-shadow:var(--shadow-md); text-align:center; }
.family-header { font-family:'Fredoka One',cursive; font-size:3rem; color:var(--clr-primary); margin-bottom:20px; }
.words-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:12px; }
.word-tile { background:#f9fafb; border:3px solid #e5e7eb; border-radius:14px; padding:14px 8px; font-family:'Fredoka One',cursive; font-size:1.4rem; cursor:pointer; text-align:center; transition:all .15s; }
.word-tile:hover { background:#e0e7ff; border-color:var(--clr-blue); transform:translateY(-2px); }
.mode-toggle { display:flex; gap:8px; justify-content:center; margin-bottom:16px; }
.mode-btn { background:#f3f4f6; border:3px solid #e5e7eb; border-radius:12px; padding:8px 16px; font-weight:800; font-size:.9rem; cursor:pointer; }
.mode-btn.active { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
/* Quiz */
.quiz-section { background:white; border-radius:24px; padding:28px 20px; box-shadow:var(--shadow-md); margin-top:0; }
.quiz-prompt { font-size:1.1rem; font-weight:800; margin-bottom:20px; }
.quiz-choices { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.qchoice { background:#f3f4f6; border:3px solid transparent; border-radius:14px; padding:14px 18px;
  font-family:'Fredoka One',cursive; font-size:1.4rem; cursor:pointer; transition:all .15s; }
.qchoice.correct { background:#dcfce7; border-color:var(--clr-green); }
.qchoice.wrong   { background:#fee2e2; border-color:var(--clr-primary); }
.odd-word { font-family:'Fredoka One',cursive; font-size:clamp(2rem,8vw,3.5rem); color:var(--clr-primary); margin:12px 0; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Word Families</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#f97316,#c2410c)">
  <h1>👨‍👩‍👧‍👦 Word Families</h1>
  <p>Words that rhyme share the same ending!</p>
</div>
<main>
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-browse">📖 Browse</button>
    <button class="mode-btn" id="mode-rhyme">🎯 Rhyme Quiz</button>
    <button class="mode-btn" id="mode-odd">🦆 Odd One Out</button>
  </div>

  <!-- Browse mode -->
  <div id="browse-section">
    <div class="family-tabs" id="tabs"></div>
    <div class="family-card" id="family-card">
      <div class="family-header" id="family-header">-at family</div>
      <div class="words-grid" id="words-grid"></div>
      <div style="margin-top:20px"><button class="btn btn-primary" id="btn-all">🔊 Say All</button></div>
    </div>
  </div>

  <!-- Rhyme quiz -->
  <div id="rhyme-section" style="display:none">
    <div class="quiz-section">
      <p style="font-weight:700;color:var(--clr-text-soft);margin-bottom:8px" id="rq-label">Question 1 of 12</p>
      <div class="progress-wrap" style="margin-bottom:16px"><div class="progress-bar" id="rq-bar" style="width:8%"></div></div>
      <p class="quiz-prompt" id="rq-prompt">Which word rhymes with <strong>cat</strong>?</p>
      <div class="quiz-choices" id="rq-choices"></div>
      <p style="font-weight:700;margin-top:16px">Score: <span id="rq-score">0</span>/<span id="rq-total">0</span></p>
    </div>
  </div>

  <!-- Odd one out -->
  <div id="odd-section" style="display:none">
    <div class="quiz-section">
      <p style="font-weight:700;color:var(--clr-text-soft);margin-bottom:8px" id="oq-label">Question 1 of 8</p>
      <div class="progress-wrap" style="margin-bottom:16px"><div class="progress-bar" id="oq-bar" style="width:12.5%"></div></div>
      <p class="quiz-prompt">Which word does <strong>NOT</strong> rhyme with the others?</p>
      <div class="quiz-choices" id="oq-choices"></div>
      <p style="font-weight:700;margin-top:16px">Score: <span id="oq-score">0</span>/<span id="oq-total">0</span></p>
    </div>
  </div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const FAMILIES = PHONICS_DATA.rhymes;
let cur = 0;

// Browse
function renderFamily() {
  const f = FAMILIES[cur];
  document.getElementById('family-header').textContent = `-${f.family} family`;
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', i===cur));
  const grid = document.getElementById('words-grid');
  grid.innerHTML = '';
  f.words.forEach(w => {
    const tile = document.createElement('div');
    tile.className = 'word-tile';
    tile.innerHTML = w.slice(0,-f.family.length) + `<span style="color:var(--clr-primary)">${f.family}</span>`;
    tile.addEventListener('click', () => { AudioManager.speak(w, {rate:.75}); AudioManager.playTone('click'); });
    grid.appendChild(tile);
  });
}

const tabs = document.getElementById('tabs');
FAMILIES.forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = `tab-btn ${i===0?'active':''}`;
  btn.textContent = `-${f.family}`;
  btn.addEventListener('click', () => { cur = i; renderFamily(); });
  tabs.appendChild(btn);
});

document.getElementById('btn-all').addEventListener('click', () => {
  const words = FAMILIES[cur].words;
  let i = 0;
  function next() { if(i>=words.length) return; AudioManager.speak(words[i++], {rate:.8, onEnd:()=>setTimeout(next,300)}); }
  next();
});
renderFamily();

// Rhyme quiz
let rqIdx=0, rqScore=0, rqTotal=0, rqAnswered=false;
const allWords = FAMILIES.flatMap(f => f.words.map(w => ({word:w, family:f.family})));
const shuffledRQ = UI.shuffle(allWords).slice(0,12);

function loadRQ() {
  if(rqIdx>=shuffledRQ.length){endRQ();return;}
  rqAnswered=false;
  const q=shuffledRQ[rqIdx];
  document.getElementById('rq-label').textContent=`Question ${rqIdx+1} of ${shuffledRQ.length}`;
  UI.updateProgress(document.getElementById('rq-bar'),rqIdx+1,shuffledRQ.length);
  document.getElementById('rq-prompt').innerHTML=`Which word rhymes with <strong style="color:var(--clr-primary);font-size:1.3em">${q.word}</strong>?`;
  AudioManager.speak(q.word,{rate:.75});

  const sameFamily=FAMILIES.find(f=>f.family===q.family).words.filter(w=>w!==q.word);
  const correct=UI.shuffle(sameFamily)[0];
  const wrongFamilies=UI.shuffle(FAMILIES.filter(f=>f.family!==q.family)).slice(0,3);
  const wrongs=wrongFamilies.map(f=>UI.shuffle(f.words)[0]);
  const opts=UI.shuffle([correct,...wrongs]);
  const rc=document.getElementById('rq-choices');
  rc.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='qchoice';btn.textContent=opt;
    btn.addEventListener('click',()=>{
      if(rqAnswered)return;rqAnswered=true;rqTotal++;
      const right=opt===correct;
      btn.classList.add(right?'correct':'wrong');
      if(right){rqScore++;AudioManager.playTone('correct');UI.showFeedback(true);}
      else{AudioManager.playTone('wrong');rc.querySelectorAll('.qchoice').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});}
      document.getElementById('rq-score').textContent=rqScore;
      document.getElementById('rq-total').textContent=rqTotal;
      rc.querySelectorAll('.qchoice').forEach(b=>b.style.pointerEvents='none');
      rqIdx++;setTimeout(loadRQ,1400);
    });
    rc.appendChild(btn);
  });
}

function endRQ(){
  const pct=Math.round((rqScore/shuffledRQ.length)*100);
  document.getElementById('rhyme-section').innerHTML=`<div class="quiz-section" style="text-align:center"><div style="font-size:3.5rem;margin-bottom:12px">${pct>=80?'🏆':'⭐'}</div><h2 style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:8px">${pct>=80?'Rhyme Champion!':'Keep Practising!'}</h2><p style="color:#666;margin-bottom:20px">Score: ${rqScore}/${shuffledRQ.length}</p><button class="btn btn-primary" onclick="location.reload()">🔄 Try Again</button></div>`;
  if(typeof analytics!=='undefined') analytics.trackActivityComplete('word-families',rqScore,shuffledRQ.length);
  if(window.CurriculumManager) window.CurriculumManager.markActivityComplete('word-families');
}

// Odd one out
let oqIdx=0,oqScore=0,oqTotal=0,oqAnswered=false;
const ODD_QUESTIONS=UI.shuffle(FAMILIES).slice(0,8).map(f=>{
  const threeFromFamily=UI.shuffle(f.words).slice(0,3);
  const oddFamily=UI.shuffle(FAMILIES.filter(x=>x.family!==f.family))[0];
  const odd=UI.shuffle(oddFamily.words)[0];
  return {words:UI.shuffle([...threeFromFamily,odd]),odd,family:f.family};
});

function loadOQ(){
  if(oqIdx>=ODD_QUESTIONS.length){endOQ();return;}
  oqAnswered=false;
  const q=ODD_QUESTIONS[oqIdx];
  document.getElementById('oq-label').textContent=`Question ${oqIdx+1} of ${ODD_QUESTIONS.length}`;
  UI.updateProgress(document.getElementById('oq-bar'),oqIdx+1,ODD_QUESTIONS.length);
  const oc=document.getElementById('oq-choices');
  oc.innerHTML='';
  q.words.forEach(w=>{
    const btn=document.createElement('button');
    btn.className='qchoice';btn.textContent=w;
    btn.addEventListener('click',()=>{
      if(oqAnswered)return;oqAnswered=true;oqTotal++;
      const right=w===q.odd;
      btn.classList.add(right?'correct':'wrong');
      if(right){oqScore++;AudioManager.playTone('correct');UI.showFeedback(true);}
      else{AudioManager.playTone('wrong');oc.querySelectorAll('.qchoice').forEach(b=>{if(b.textContent===q.odd)b.classList.add('correct');});}
      document.getElementById('oq-score').textContent=oqScore;
      document.getElementById('oq-total').textContent=oqTotal;
      oc.querySelectorAll('.qchoice').forEach(b=>b.style.pointerEvents='none');
      oqIdx++;setTimeout(loadOQ,1400);
    });
    oc.appendChild(btn);
  });
}

function endOQ(){
  const pct=Math.round((oqScore/ODD_QUESTIONS.length)*100);
  document.getElementById('odd-section').innerHTML=`<div class="quiz-section" style="text-align:center"><div style="font-size:3.5rem;margin-bottom:12px">${pct>=75?'🏆':'⭐'}</div><p style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:8px">${pct>=75?'Sharp ears!':'Keep listening!'}</p><p style="color:#666;margin-bottom:20px">${oqScore}/${ODD_QUESTIONS.length}</p><button class="btn btn-primary" onclick="location.reload()">🔄 Try Again</button></div>`;
}

// Mode toggle
function setMode(m){
  ['browse','rhyme','odd'].forEach(x=>{
    document.getElementById(`${x}-section`).style.display=x===m?'block':'none';
    document.getElementById(`mode-${x}`).classList.toggle('active',x===m);
  });
  if(m==='rhyme'&&rqIdx===0) loadRQ();
  if(m==='odd'&&oqIdx===0) loadOQ();
}
document.getElementById('mode-browse').addEventListener('click',()=>setMode('browse'));
document.getElementById('mode-rhyme').addEventListener('click',()=>setMode('rhyme'));
document.getElementById('mode-odd').addEventListener('click',()=>setMode('odd'));
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("word-families");
window.addEventListener('beforeunload',function(){
  if(typeof analytics!=="undefined") analytics.trackActivityComplete("word-families",0,10);
  if(window.CurriculumManager) window.CurriculumManager.markActivityComplete('word-families');
});</script>
</body>
</html>
