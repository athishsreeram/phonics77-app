<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>✏️ Digraph Test · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .test-card { background:white; border-radius:32px; padding:32px 24px; text-align:center; box-shadow:var(--shadow-md); margin-bottom:24px; }
    .word-display { font-family:'Fredoka One',cursive; font-size:clamp(2.5rem,10vw,5rem); letter-spacing:0.08em; margin-bottom:16px; }
    .blank { display:inline-block; min-width:clamp(50px,12vw,90px); border-bottom:6px solid var(--clr-purple); color:var(--clr-purple); }
    .hint-emoji { font-size:clamp(2.5rem,10vw,5rem); margin-bottom:12px; display:block; }
    .choices-row { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:20px 0; }
    .dg-choice {
      padding:14px 24px; border-radius:20px; border:4px solid #eee; background:#f8f8f8;
      font-family:'Fredoka One',cursive; font-size:clamp(1.4rem,5vw,2rem);
      cursor:pointer; transition:all 0.15s; min-height:var(--tap-min); min-width:80px;
    }
    .dg-choice:hover   { background:#f0f0f0; border-color:var(--clr-purple); }
    .dg-choice.correct { background:#f0fdf4; border-color:var(--clr-green); color:var(--clr-green); }
    .dg-choice.wrong   { background:#fff0f0; border-color:var(--clr-primary); }
    .dg-choice:active  { transform:scale(0.95); }
    .progress-text { font-size:1.1rem; font-weight:700; color:var(--clr-text-soft); }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Digraph Test</span>
    </div>
    <div class="nav-right"></div>
  </nav>
  <div class="page-header" style="background:linear-gradient(135deg,var(--stage3),#c4b5fd)">
    <h1>✏️ Digraph Test</h1>
    <p>Fill in the missing digraph!</p>
  </div>
  <main>
    <div class="test-card">
      <span class="hint-emoji" id="hint-emoji">🐑</span>
      <div class="word-display" id="word-display"><span class="blank" id="blank-slot">__</span>eep</div>
      <p style="font-size:1.1rem;color:var(--clr-text-soft);margin-bottom:8px">Which digraph completes the word?</p>
      <button class="btn btn-primary" id="btn-play" style="margin:0 auto 20px;display:flex">🔊 Hear Word</button>
      <div class="choices-row" id="choices-row"></div>
      <p class="progress-text">Question <span id="q-num">1</span> / 10 · Score: <span id="score">0</span></p>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
  </main>
  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const QUESTIONS = [
      {word:'sheep', blank:'sh', rest:'eep', emoji:'🐑', choices:['sh','ch','th','wh']},
      {word:'chair', blank:'ch', rest:'air', emoji:'🪑', choices:['sh','ch','th','ph']},
      {word:'think', blank:'th', rest:'ink', emoji:'💭', choices:['sh','ch','th','wh']},
      {word:'whale', blank:'wh', rest:'ale', emoji:'🐋', choices:['sh','wh','th','ph']},
      {word:'phone', blank:'ph', rest:'one', emoji:'📱', choices:['ph','ch','sh','th']},
      {word:'ring',  blank:'r',  rest:'ing', emoji:'💍', choices:['ng','ch','sh','th'], full:true},
      {word:'black', blank:'bl', rest:'ack', emoji:'⬛', choices:['ck','ch','sh','ng'], position:'end', display:'bla', endblank:'ck'},
      {word:'ship',  blank:'sh', rest:'ip',  emoji:'🚢', choices:['sh','ch','wh','ph']},
      {word:'three', blank:'th', rest:'ree', emoji:'3️⃣', choices:['th','sh','ch','wh']},
      {word:'check', blank:'ch', rest:'eck', emoji:'✅', choices:['ch','sh','th','wh']},
    ];

    let qIdx = 0, score = 0;

    function showQuestion() {
      const q = QUESTIONS[qIdx % QUESTIONS.length];
      document.getElementById('hint-emoji').textContent = q.emoji;
      document.getElementById('q-num').textContent = qIdx + 1;

      const blank = document.getElementById('blank-slot');
      blank.textContent = '__';

      if (q.position === 'end') {
        document.getElementById('word-display').innerHTML = `${q.display}<span class="blank" id="blank-slot">__</span>`;
      } else {
        document.getElementById('word-display').innerHTML = `<span class="blank" id="blank-slot">__</span>${q.rest}`;
      }

      document.getElementById('btn-play').onclick = () => AudioManager.speak(q.word, {rate:0.7});

      const row = document.getElementById('choices-row');
      row.innerHTML = '';
      q.choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'dg-choice';
        btn.textContent = ch;
        btn.addEventListener('click', () => {
          const correct = ch === q.blank || (q.position==='end' && ch === q.endblank);
          btn.classList.add(correct ? 'correct' : 'wrong');
          if (!correct) {
            row.querySelectorAll('.dg-choice').forEach(b => { if(b.textContent===q.blank||(q.position==='end'&&b.textContent===q.endblank)) b.classList.add('correct'); });
          } else {
            score++;
            AudioManager.playTone('correct');
            UI.showFeedback(true, 900);
            // Fill in blank
            const blankEl = document.getElementById('blank-slot');
            if (blankEl) { blankEl.textContent = ch; blankEl.style.color = 'var(--clr-green)'; }
          }
          if (!correct) AudioManager.playTone('wrong');
          row.querySelectorAll('.dg-choice').forEach(b => b.style.pointerEvents='none');
          document.getElementById('score').textContent = score;
          UI.updateProgress(document.getElementById('prog-bar'), qIdx+1, 10);
          UI.setScore('digraph_fill', {stars: Math.floor(score/2), total: score});
          qIdx++;
          setTimeout(showQuestion, correct?1200:1800);
        });
        row.appendChild(btn);
      });

      AudioManager.speak(q.word, {rate:0.7});
    }

    showQuestion();
  </script>
</body>
</html>
