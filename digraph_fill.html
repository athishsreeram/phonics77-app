<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔊 Vowel Digraphs · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.fill-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:500px; margin:28px auto; }
.fill-prompt { font-size:clamp(1.2rem,4vw,1.6rem); font-weight:800; margin-bottom:24px; }
.blank-word { font-family:'Fredoka One',cursive; font-size:clamp(2.5rem,10vw,5rem); letter-spacing:4px; color:var(--clr-text); }
.blank-slot { color:var(--clr-primary); border-bottom:4px solid var(--clr-primary); min-width:60px; display:inline-block; }
.choices { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:24px; }
.choice { background:#f3f4f6; border:3px solid transparent; border-radius:14px; padding:12px 20px; font-family:'Fredoka One',cursive; font-size:1.6rem; cursor:pointer; transition:all .15s; }
.choice.correct { background:#dcfce7; border-color:var(--clr-green); }
.choice.wrong   { background:#fee2e2; border-color:var(--clr-primary); }
.score-info { font-weight:700; color:var(--clr-text-soft); margin-top:16px; }
.mode-toggle { display:flex; gap:8px; justify-content:center; margin-bottom:20px; }
.mode-btn { background:#f3f4f6; border:3px solid #e5e7eb; border-radius:12px; padding:8px 14px; font-weight:700; font-size:.9rem; cursor:pointer; transition:all .2s; }
.mode-btn.active { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
.multi-sound-badge { display:inline-block; background:#fef3c7; color:#92400e; border-radius:6px; padding:4px 10px; font-size:.8rem; font-weight:800; margin-top:8px; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Digraph Fill</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#14b8a6,#0d9488)">
  <h1>🔊 Vowel Digraphs</h1>
  <p>Fill in the missing digraph!</p>
</div>
<main>
<div class="fill-card" id="fill-card">
  <div class="mode-toggle" id="mode-toggle">
    <button class="mode-btn active" id="mode-basic">🎯 Basic</button>
    <button class="mode-btn" id="mode-mixed">🎲 Mixed</button>
  </div>
  <p class="fill-prompt" id="fill-prompt">Which digraph completes the word?</p>
  <div class="blank-word" id="blank-word">__ark</div>
  <div style="font-size:3rem;margin:12px 0" id="fill-emoji">🦈</div>
  <div id="multi-info" style="display:none"></div>
  <div class="choices" id="choices"></div>
  <div class="score-info">Score: <span id="fscore">0</span> / <span id="ftotal">0</span></div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const VD = PHONICS_DATA.vowelDigraphs;
let fscore=0, ftotal=0, answered=false, correct_dg=null, mixedMode=false;

function loadQ() {
  answered = false;
  const idx = Math.floor(Math.random() * VD.length);
  correct_dg = VD[idx];
  const word = correct_dg.word.toLowerCase();
  const blank = word.replace(correct_dg.pair.toLowerCase(), '__');
  document.getElementById('blank-word').textContent = blank;
  document.getElementById('fill-emoji').textContent = correct_dg.emoji;
  document.getElementById('fill-prompt').textContent = `Which digraph completes: "${blank}"?`;
  
  // Show multi-sound indicator in mixed mode
  const multiInfo = document.getElementById('multi-info');
  if (mixedMode && correct_dg.sounds && correct_dg.sounds.length > 1) {
    multiInfo.innerHTML = `<div class="multi-sound-badge">This digraph has multiple sounds! 🔊</div>`;
    multiInfo.style.display = 'block';
  } else {
    multiInfo.style.display = 'none';
  }
  
  AudioManager.speak(correct_dg.word, {rate:.75});

  const pool = UI.shuffle(VD.filter(d=>d.pair!==correct_dg.pair)).slice(0,3);
  const opts = UI.shuffle([correct_dg, ...pool]);
  const ch   = document.getElementById('choices');
  ch.innerHTML='';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className='choice'; btn.textContent=o.pair;
    btn.addEventListener('click', () => {
      if(answered) return; answered=true; ftotal++;
      const right = o.pair===correct_dg.pair;
      btn.classList.add(right?'correct':'wrong');
      if(right){ fscore++; AudioManager.playTone('correct'); UI.showFeedback(true); }
      else { AudioManager.playTone('wrong'); ch.querySelectorAll('.choice').forEach(x=>{ if(x.textContent===correct_dg.pair)x.classList.add('correct'); }); }
      document.getElementById('fscore').textContent=fscore;
      document.getElementById('ftotal').textContent=ftotal;
      ch.querySelectorAll('.choice').forEach(x=>x.style.pointerEvents='none');
      setTimeout(loadQ, 1400);
    });
    ch.appendChild(btn);
  });
}

// Mode toggle
document.getElementById('mode-basic').addEventListener('click', () => {
  mixedMode = false;
  document.getElementById('mode-basic').classList.add('active');
  document.getElementById('mode-mixed').classList.remove('active');
  fscore = 0; ftotal = 0;
  document.getElementById('fscore').textContent = '0';
  document.getElementById('ftotal').textContent = '0';
  loadQ();
});

document.getElementById('mode-mixed').addEventListener('click', () => {
  mixedMode = true;
  document.getElementById('mode-mixed').classList.add('active');
  document.getElementById('mode-basic').classList.remove('active');
  fscore = 0; ftotal = 0;
  document.getElementById('fscore').textContent = '0';
  document.getElementById('ftotal').textContent = '0';
  loadQ();
});

loadQ();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("vowel-digraphs");
window.addEventListener('beforeunload', function() {
  if(typeof analytics!=="undefined") {
    var s = typeof fscore!=="undefined" ? fscore : 0;
    var t = typeof ftotal!=="undefined" ? ftotal : 10;
    analytics.trackActivityComplete("vowel-digraphs", s, t);
  }
});</script>
</body>
</html>
