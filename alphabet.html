<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🔤 Alphabet A–Z · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.alphabet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
@media (min-width: 600px)  { .alphabet-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 16px; } }
@media (min-width: 1024px) { .alphabet-grid { grid-template-columns: repeat(7, 1fr); gap: 18px; } }

.alpha-card {
  aspect-ratio: 1;
  background: white;
  border-radius: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(0,0,0,.10);
  border: 4px solid #eee;
  transition: transform .15s, box-shadow .15s, border-color .15s, background .2s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.alpha-card:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.10); }
.alpha-card:hover  { transform: translateY(-4px); box-shadow: 0 8px 0 rgba(0,0,0,.10); }
.alpha-card.mastered { background: #f0fdf4; border-color: var(--clr-green); }
.alpha-card .big-letter    { font-family: 'Fredoka One', cursive; font-size: clamp(1.8rem,5vw,2.8rem); line-height: 1; }
.alpha-card .example-word  { font-size: clamp(.75rem,2vw,.95rem); font-weight: 700; color: var(--clr-text-soft); }
.alpha-card .example-emoji { font-size: clamp(1rem,3vw,1.4rem); }
.alpha-card .mastered-check { position:absolute; top:6px; right:8px; font-size:1rem; opacity:0; transition:opacity .3s; }
.alpha-card.mastered .mastered-check { opacity:1; }
.alpha-card.vowel { border-color: var(--clr-primary); }

.controls-bar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; align-items:center; justify-content:center; }

.stats-bar { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px; }
.stat-box { background:white; border-radius:16px; padding:14px 12px; text-align:center; box-shadow:var(--shadow-sm); }
.stat-num { font-family:'Fredoka One',cursive; font-size:clamp(1.6rem,5vw,2.4rem); line-height:1; display:block; }
.stat-lbl { font-size:.9rem; color:var(--clr-text-soft); font-weight:600; }

.quiz-section { background:white; border-radius:28px; padding:28px 20px; text-align:center; box-shadow:var(--shadow-md); margin-bottom:32px; display:none; }
.quiz-section.active { display:block; animation:fadeIn .3s ease; }
.quiz-prompt { font-size:clamp(1.3rem,4vw,1.8rem); font-weight:700; margin-bottom:24px; color:var(--clr-text); }
.quiz-choices { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; max-width:480px; margin:0 auto; }
@media (min-width:600px) { .quiz-choices { grid-template-columns:repeat(4,1fr); } }
.quiz-choice {
  background:#f8f8f8; border:4px solid transparent; border-radius:20px; padding:20px 12px;
  font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,6vw,2.8rem);
  cursor:pointer; transition:transform .15s,border-color .15s,background .15s;
  -webkit-tap-highlight-color:transparent; min-height:80px;
  display:flex; align-items:center; justify-content:center;
}
.quiz-choice:active { transform:scale(.95); }
.quiz-choice:hover  { background:#f0f0f0; border-color:var(--clr-secondary); }
.quiz-choice.correct { background:#f0fdf4; border-color:var(--clr-green); }
.quiz-choice.wrong   { background:#fff0f0; border-color:var(--clr-primary); }
.quiz-score { font-size:clamp(1rem,3vw,1.3rem); font-weight:700; color:var(--clr-text-soft); margin-top:20px; }

.letter-detail {
  position:fixed; bottom:0; left:0; right:0;
  background:white; border-radius:32px 32px 0 0;
  padding:28px 28px calc(28px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 40px rgba(0,0,0,.18);
  z-index:150; transform:translateY(100%);
  transition:transform .35s cubic-bezier(.34,1.2,.64,1);
  text-align:center;
}
.letter-detail.open { transform:translateY(0); }
.detail-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:140; opacity:0; pointer-events:none; transition:opacity .3s; }
.detail-backdrop.open { opacity:1; pointer-events:auto; }
.detail-letter { font-family:'Fredoka One',cursive; font-size:clamp(5rem,18vw,10rem); line-height:1; display:block; }
.detail-cases  { font-size:clamp(2rem,8vw,4rem); font-weight:700; color:var(--clr-text-soft); margin:4px 0 12px; }
.detail-word   { font-size:clamp(1.4rem,5vw,2.2rem); font-weight:800; margin-bottom:20px; }
.detail-close  { position:absolute; top:16px; right:20px; background:#eee; border:none; border-radius:50%; width:44px; height:44px; font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.detail-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn" aria-label="Home">🏠</a>
    <span class="nav-title">Alphabet A–Z</span>
  </div>
  <div class="nav-right"></div>
</nav>

<div class="page-header" style="background:linear-gradient(135deg,var(--stage1),#ff8c5a)">
  <h1>🔤 Alphabet A–Z</h1>
  <p>Tap each letter to hear its name and sound!</p>
</div>

<main>
  <div class="stats-bar" style="margin-top:24px">
    <div class="stat-box"><span class="stat-num" id="mastered-count">0</span><span class="stat-lbl">Mastered</span></div>
    <div class="stat-box"><span class="stat-num" id="stars-count">0</span><span class="stat-lbl">⭐ Stars</span></div>
    <div class="stat-box"><span class="stat-num">26</span><span class="stat-lbl">Letters</span></div>
  </div>
  <div class="progress-wrap" style="margin-bottom:20px">
    <div class="progress-bar" id="mastery-bar" style="width:0%"></div>
  </div>
  <div class="controls-bar">
    <button class="btn btn-secondary" id="btn-explore">🔍 Explore</button>
    <button class="btn btn-primary"   id="btn-autoplay">▶️ Auto-Play</button>
    <button class="btn btn-purple"    id="btn-quiz">🎯 Quiz Mode</button>
    <button class="btn btn-accent"    id="btn-reset">🔄 Reset</button>
  </div>
  <div class="quiz-section" id="quiz-section">
    <p class="quiz-prompt" id="quiz-prompt">Which letter makes this sound?</p>
    <button class="btn btn-primary btn-lg" id="quiz-play-btn" style="margin:0 auto 24px;display:flex">🔊 Play Sound</button>
    <div class="quiz-choices" id="quiz-choices"></div>
    <p class="quiz-score">Score: <span id="quiz-score">0</span> / <span id="quiz-total">0</span></p>
  </div>
  <div class="alphabet-grid" id="alphabet-grid"></div>
</main>

<div class="detail-backdrop" id="detail-backdrop"></div>
<div class="letter-detail" id="letter-detail">
  <button class="detail-close" id="detail-close" aria-label="Close">✕</button>
  <span class="detail-letter" id="detail-letter">A</span>
  <div class="detail-cases" id="detail-cases">A a</div>
  <div class="detail-word" id="detail-word">🍎 Apple</div>
  <div class="detail-actions">
    <button class="btn btn-primary btn-lg" id="detail-speak-name">🔊 Name</button>
    <button class="btn btn-secondary btn-lg" id="detail-speak-sound">🎵 Sound</button>
    <button class="btn btn-green btn-lg" id="detail-mastered-btn">✅ Mastered!</button>
  </div>
</div>

<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const LETTERS = PHONICS_DATA.alphabet;
const VOWELS  = new Set(['A','E','I','O','U']);

let mastered    = new Set(JSON.parse(localStorage.getItem('alpha_mastered') || '[]'));
let quizScore   = 0, quizTotal = 0;
let quizActive  = false, quizAnswer = null;
let autoPlaying = false, autoTimer = null;
let currentLetter = null;

const grid = document.getElementById('alphabet-grid');

function buildGrid() {
  grid.innerHTML = '';
  LETTERS.forEach(data => {
    const card = document.createElement('div');
    const hue  = (data.l.charCodeAt(0) - 65) * 14;
    card.className = `alpha-card ${data.vowel ? 'vowel' : 'consonant'} ${mastered.has(data.l) ? 'mastered' : ''}`;
    card.dataset.letter = data.l;
    card.setAttribute('role','button');
    card.setAttribute('aria-label',`Letter ${data.l}, ${data.word}`);
    card.tabIndex = 0;
    if (!mastered.has(data.l)) card.style.borderColor = `hsl(${hue},60%,80%)`;
    card.innerHTML = `
      <span class="example-emoji">${data.emoji}</span>
      <span class="big-letter" style="color:hsl(${hue},70%,45%)">${data.l}</span>
      <span class="example-word">${data.word}</span>
      <span class="mastered-check">✅</span>`;
    card.addEventListener('click', () => openDetail(data));
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') openDetail(data); });
    grid.appendChild(card);
  });
}

function refreshStats() {
  const n = mastered.size;
  document.getElementById('mastered-count').textContent = n;
  document.getElementById('stars-count').textContent = n;
  UI.updateProgress(document.getElementById('mastery-bar'), n, 26);
}

function saveMastered() {
  localStorage.setItem('alpha_mastered', JSON.stringify([...mastered]));
  UI.setScore('alphabet', { stars: mastered.size, total: 26 });
}

function openDetail(data) {
  currentLetter = data;
  const hue = (data.l.charCodeAt(0) - 65) * 14;
  document.getElementById('detail-letter').textContent = data.l;
  document.getElementById('detail-letter').style.color = `hsl(${hue},70%,50%)`;
  document.getElementById('detail-cases').textContent  = `${data.l} ${data.l.toLowerCase()}`;
  document.getElementById('detail-word').innerHTML     = `${data.emoji} <strong>${data.word}</strong>`;
  const btn = document.getElementById('detail-mastered-btn');
  btn.textContent = mastered.has(data.l) ? '💚 Mastered!' : '✅ Mark Mastered';
  btn.style.background = mastered.has(data.l) ? 'var(--clr-green)' : '';
  document.getElementById('letter-detail').classList.add('open');
  document.getElementById('detail-backdrop').classList.add('open');
  AudioManager.speak(`${data.l}. ${data.sound}. ${data.word}`);
  AudioManager.playTone('click');
}

function closeDetail() {
  document.getElementById('letter-detail').classList.remove('open');
  document.getElementById('detail-backdrop').classList.remove('open');
  AudioManager.stop();
}

document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-backdrop').addEventListener('click', closeDetail);
document.getElementById('detail-speak-name').addEventListener('click', () => { if(currentLetter) AudioManager.speak(currentLetter.l, {rate:.7}); });
document.getElementById('detail-speak-sound').addEventListener('click', () => { if(currentLetter) AudioManager.speak(currentLetter.sound, {rate:.7}); });
document.getElementById('detail-mastered-btn').addEventListener('click', () => {
  if (!currentLetter) return;
  if (mastered.has(currentLetter.l)) { mastered.delete(currentLetter.l); }
  else { mastered.add(currentLetter.l); AudioManager.playTone('star'); UI.showFeedback(true); }
  saveMastered(); buildGrid(); refreshStats(); closeDetail();
});

document.getElementById('btn-autoplay').addEventListener('click', () => {
  if (autoPlaying) { clearTimeout(autoTimer); autoPlaying = false; document.getElementById('btn-autoplay').textContent = '▶️ Auto-Play'; return; }
  autoPlaying = true; document.getElementById('btn-autoplay').textContent = '⏹ Stop';
  let i = 0;
  function playNext() {
    if (!autoPlaying || i >= LETTERS.length) { autoPlaying = false; document.getElementById('btn-autoplay').textContent = '▶️ Auto-Play'; return; }
    const data = LETTERS[i++];
    AudioManager.speak(`${data.l}. ${data.word}`, { onEnd: () => { autoTimer = setTimeout(playNext, 600); } });
  }
  playNext();
});

document.getElementById('btn-quiz').addEventListener('click', () => {
  quizActive = !quizActive;
  document.getElementById('quiz-section').classList.toggle('active', quizActive);
  document.getElementById('btn-quiz').textContent = quizActive ? '✕ Close Quiz' : '🎯 Quiz Mode';
  if (quizActive) nextQuestion();
});

function nextQuestion() {
  const idx = Math.floor(Math.random() * LETTERS.length);
  quizAnswer = LETTERS[idx];
  const pool = UI.shuffle(LETTERS.filter(l => l.l !== quizAnswer.l)).slice(0, 3);
  const choices = UI.shuffle([quizAnswer, ...pool]);
  document.getElementById('quiz-prompt').textContent = `Which letter makes the "${quizAnswer.sound}" sound?`;
  document.getElementById('quiz-play-btn').onclick = () => AudioManager.speak(quizAnswer.sound, {rate:.7});
  AudioManager.speak(quizAnswer.sound, {rate:.7});
  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'quiz-choice'; btn.textContent = ch.l;
    btn.addEventListener('click', () => answerQuiz(ch.l === quizAnswer.l, btn, choicesEl));
    choicesEl.appendChild(btn);
  });
}

function answerQuiz(correct, btn, container) {
  quizTotal++;
  if (correct) {
    quizScore++; btn.classList.add('correct');
    AudioManager.playTone('correct'); UI.showFeedback(true, 900);
    setTimeout(nextQuestion, 1200);
  } else {
    btn.classList.add('wrong'); AudioManager.playTone('wrong');
    container.querySelectorAll('.quiz-choice').forEach(b => { if (b.textContent === quizAnswer.l) b.classList.add('correct'); });
    setTimeout(nextQuestion, 1600);
  }
  document.getElementById('quiz-score').textContent = quizScore;
  document.getElementById('quiz-total').textContent = quizTotal;
  container.querySelectorAll('.quiz-choice').forEach(b => b.style.pointerEvents = 'none');
}

document.getElementById('btn-explore').addEventListener('click', () => {
  const first = LETTERS.find(l => !mastered.has(l.l)) || LETTERS[0];
  openDetail(first);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Reset all alphabet progress?')) return;
  mastered.clear(); saveMastered(); buildGrid(); refreshStats();
  UI.toast('Progress reset! Start fresh! 🌟');
});

buildGrid();
refreshStats();
</script>
</body>
</html>
