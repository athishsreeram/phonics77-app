<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 Digraph Practice · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.activity-container{max-width:560px;margin:28px auto}
.digraph-card{background:white;border-radius:28px;padding:36px 24px;text-align:center;box-shadow:var(--shadow-md);margin-bottom:20px}
.digraph-big{font-family:'Fredoka One',cursive;font-size:clamp(4rem,15vw,8rem);color:var(--clr-primary);line-height:1}
.digraph-word{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;margin:12px 0 8px}
.digraph-emoji{font-size:clamp(3rem,10vw,5rem);display:block;margin-bottom:12px}
.digraph-sound{font-size:1rem;color:var(--clr-text-soft);font-weight:700}
.nav-dots{display:flex;justify-content:center;gap:10px;margin:16px 0}
.nav-dot{width:12px;height:12px;border-radius:50%;background:#e5e7eb;border:none;cursor:pointer;transition:background .2s}
.nav-dot.active{background:var(--clr-primary)}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.quiz-area{background:white;border-radius:20px;padding:24px;box-shadow:var(--shadow-sm);text-align:center}
.quiz-q{font-size:1.2rem;font-weight:700;margin-bottom:16px}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:360px;margin:0 auto}
.qbtn{background:#f3f4f6;border:3px solid transparent;border-radius:14px;padding:16px 12px;font-family:'Fredoka One',cursive;font-size:1.6rem;cursor:pointer;transition:all .15s}
.qbtn.correct{background:#dcfce7;border-color:var(--clr-green)}
.qbtn.wrong{background:#fee2e2;border-color:var(--clr-primary)}
</style>
</head>
<body>
<nav class="top-nav"><div class="nav-left"><a href="index.html" class="nav-home-btn">🏠</a><span class="nav-title">Digraph Practice</span></div></nav>
<div class="page-header" style="background:linear-gradient(135deg,#0ea5e9,#0284c7)"><h1>📖 Digraph Practice</h1><p>Two letters, one sound!</p></div>
<main>
<div class="activity-container">
<div class="digraph-card" id="digraph-card">
  <span class="digraph-emoji" id="d-emoji">🦈</span>
  <div class="digraph-big" id="d-pair">SH</div>
  <div class="digraph-word" id="d-word">Shark</div>
  <div class="digraph-sound" id="d-sound">Sound: "shh"</div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-say">🔊 Say It</button>
    <button class="btn btn-secondary" id="btn-prev">← Prev</button>
    <button class="btn btn-accent" id="btn-next">Next →</button>
  </div>
</div>
<div class="nav-dots" id="nav-dots"></div>
<div class="quiz-area" id="quiz-area" style="display:none">
  <p class="quiz-q" id="quiz-q">Which digraph makes the "shh" sound?</p>
  <div class="quiz-choices" id="quiz-choices"></div>
  <p style="font-size:.9rem;color:var(--clr-text-soft);margin-top:12px">Score: <span id="qscore">0</span>/<span id="qtotal">0</span></p>
</div>
<div style="text-align:center;margin-top:16px"><button class="btn btn-purple" id="btn-quiz">🎯 Start Quiz</button></div>
</div>
</main>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/analytics.js"></script><script src="js/audio.js"></script><script src="js/materials.js"></script><script src="js/ui.js"></script>
<script>
const DG=PHONICS_DATA.digraphs;let cur=0,quizMode=false,qs=0,qt=0,qa=null;
function renderCard(){const d=DG[cur];document.getElementById('d-emoji').textContent=d.emoji;document.getElementById('d-pair').textContent=d.pair;document.getElementById('d-word').textContent=d.word;document.getElementById('d-sound').textContent=`Sound: "${d.sound}" · e.g. ${d.example}`;document.querySelectorAll('.nav-dot').forEach((dot,i)=>dot.classList.toggle('active',i===cur));}
function buildDots(){const c=document.getElementById('nav-dots');c.innerHTML='';DG.forEach((_,i)=>{const d=document.createElement('button');d.className=`nav-dot ${i===0?'active':''}`;d.addEventListener('click',()=>{cur=i;renderCard();});c.appendChild(d);});}
document.getElementById('btn-say').addEventListener('click',()=>{const d=DG[cur];AudioManager.speak(`${d.pair}. ${d.word}`,{rate:.75});});
document.getElementById('btn-prev').addEventListener('click',()=>{cur=(cur-1+DG.length)%DG.length;renderCard();});
document.getElementById('btn-next').addEventListener('click',()=>{cur=(cur+1)%DG.length;renderCard();});
document.getElementById('btn-quiz').addEventListener('click',()=>{quizMode=!quizMode;document.getElementById('quiz-area').style.display=quizMode?'block':'none';document.getElementById('btn-quiz').textContent=quizMode?'✕ Close Quiz':'🎯 Start Quiz';if(quizMode)nextQ();});
function nextQ(){const idx=Math.floor(Math.random()*DG.length);qa=DG[idx];const pool=UI.shuffle(DG.filter(d=>d.pair!==qa.pair)).slice(0,3);const opts=UI.shuffle([qa,...pool]);document.getElementById('quiz-q').textContent=`Which digraph makes the "${qa.sound}" sound?`;const qc=document.getElementById('quiz-choices');qc.innerHTML='';opts.forEach(o=>{const b=document.createElement('button');b.className='qbtn';b.textContent=o.pair;b.addEventListener('click',()=>{qt++;const correct=o.pair===qa.pair;if(correct){qs++;b.classList.add('correct');AudioManager.playTone('correct');UI.showFeedback(true);}else{b.classList.add('wrong');AudioManager.playTone('wrong');qc.querySelectorAll('.qbtn').forEach(x=>{if(x.textContent===qa.pair)x.classList.add('correct');});}document.getElementById('qscore').textContent=qs;document.getElementById('qtotal').textContent=qt;qc.querySelectorAll('.qbtn').forEach(x=>x.style.pointerEvents='none');setTimeout(nextQ,1400);});qc.appendChild(b);});AudioManager.speak(qa.sound,{rate:.7});}
buildDots();renderCard();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("digraph-practice");
window.addEventListener('beforeunload',function(){if(typeof analytics!=="undefined"){analytics.trackActivityComplete("digraph-practice",typeof qs!=="undefined"?qs:0,typeof qt!=="undefined"?qt:10);}if(window.CurriculumManager)window.CurriculumManager.markActivityComplete('digraph-practice');});</script>
</body></html>
