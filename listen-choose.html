<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>👂 Listen &amp; Choose · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .listen-card {
      background: white; border-radius: 32px; padding: 36px 24px;
      text-align: center; box-shadow: var(--shadow-md); margin-bottom: 28px;
    }
    .play-btn {
      width: clamp(120px,35vw,180px); height: clamp(120px,35vw,180px);
      border-radius: 50%; background: var(--clr-primary); border: none;
      font-size: clamp(3rem,12vw,5rem); cursor: pointer;
      box-shadow: 0 8px 0 rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; -webkit-tap-highlight-color: transparent;
    }
    .play-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
    .play-btn.playing { background: var(--clr-secondary); animation: pulse 0.6s ease infinite alternate; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }

    .choices-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; max-width: 460px; margin: 0 auto;
    }
    @media (min-width:600px) { .choices-grid { grid-template-columns: repeat(4,1fr); } }
    .choice-btn {
      background: #f8f8f8; border: 4px solid transparent; border-radius: 20px;
      padding: 18px 12px; font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem,5vw,2rem); cursor: pointer;
      transition: all 0.15s; min-height: 72px;
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;
    }
    .choice-btn .choice-emoji { font-size: 1.8rem; }
    .choice-btn:hover   { background: #f0f0f0; border-color: var(--clr-secondary); }
    .choice-btn.correct { background: #f0fdf4; border-color: var(--clr-green); }
    .choice-btn.wrong   { background: #fff0f0; border-color: var(--clr-primary); }
    .choice-btn:active  { transform: scale(0.95); }

    .round-info { font-size: 1.2rem; font-weight: 700; color: var(--clr-text-soft); margin-bottom: 12px; }
    .score-display { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--clr-primary); }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Listen &amp; Choose</span>
    </div>
    <div class="nav-right"></div>
  </nav>
  <div class="page-header" style="background:linear-gradient(135deg,var(--stage2),#5dd8d0)">
    <h1>👂 Listen &amp; Choose</h1>
    <p>Hear the word — tap the right one!</p>
  </div>
  <main>
    <div class="listen-card">
      <p class="round-info">Round <span id="round-num">1</span> — which word do you hear?</p>
      <button class="play-btn" id="play-btn" aria-label="Play word">🔊</button>
      <div class="choices-grid" id="choices-grid"></div>
    </div>
    <div class="score-bar">
      <div class="score-item">✅ <span id="correct-count">0</span> <span class="score-label">Correct</span></div>
      <div class="score-item">❌ <span id="wrong-count">0</span>  <span class="score-label">Wrong</span></div>
      <div class="score-item">⭐ <span id="stars-count">0</span>  <span class="score-label">Stars</span></div>
    </div>
  </main>
  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const WORD_POOL = [
      {word:'cat',emoji:'🐱'},{word:'dog',emoji:'🐶'},{word:'pig',emoji:'🐷'},{word:'hen',emoji:'🐔'},
      {word:'fox',emoji:'🦊'},{word:'bat',emoji:'🦇'},{word:'bug',emoji:'🐛'},{word:'rat',emoji:'🐀'},
      {word:'sun',emoji:'☀️'},{word:'cup',emoji:'🥤'},{word:'hat',emoji:'🎩'},{word:'bed',emoji:'🛏️'},
      {word:'pot',emoji:'🍳'},{word:'box',emoji:'📦'},{word:'bus',emoji:'🚌'},{word:'map',emoji:'🗺️'},
      {word:'pen',emoji:'🖊️'},{word:'top',emoji:'🔝'},{word:'net',emoji:'🥅'},{word:'log',emoji:'🪵'},
      {word:'sit',emoji:'🪑'},{word:'run',emoji:'🏃'},{word:'hop',emoji:'🐇'},{word:'mix',emoji:'🥣'},
    ];

    let answer = null, round = 1, correct = 0, wrong = 0;

    function nextRound() {
      const pool = UI.shuffle(WORD_POOL);
      answer = pool[0];
      const choices = pool.slice(0, 4);

      document.getElementById('round-num').textContent = round;
      const grid = document.getElementById('choices-grid');
      grid.innerHTML = '';
      choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-emoji">${ch.emoji}</span><span>${ch.word}</span>`;
        btn.addEventListener('click', () => answer(btn, ch, grid));
        grid.appendChild(btn);
      });

      playWord();
    }

    // shadow the function name — use closure
    function buildRound() {
      const pool = UI.shuffle(WORD_POOL);
      const ans = pool[0];
      const choices = pool.slice(0, 4);

      answer = ans;
      document.getElementById('round-num').textContent = round;
      const grid = document.getElementById('choices-grid');
      grid.innerHTML = '';
      choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-emoji">${ch.emoji}</span><span>${ch.word}</span>`;
        btn.addEventListener('click', () => {
          const isCorrect = ch.word === ans.word;
          btn.classList.add(isCorrect ? 'correct' : 'wrong');
          if (!isCorrect) {
            grid.querySelectorAll('.choice-btn').forEach(b => {
              if (b.querySelector('span:last-child').textContent === ans.word) b.classList.add('correct');
            });
          }
          grid.querySelectorAll('.choice-btn').forEach(b => b.style.pointerEvents = 'none');
          if (isCorrect) { correct++; AudioManager.playTone('correct'); UI.showFeedback(true, 900); }
          else            { wrong++;   AudioManager.playTone('wrong'); }
          document.getElementById('correct-count').textContent = correct;
          document.getElementById('wrong-count').textContent   = wrong;
          document.getElementById('stars-count').textContent   = Math.floor(correct / 2);
          UI.setScore('listen', { stars: Math.floor(correct/2), total: correct+wrong });
          round++;
          setTimeout(buildRound, isCorrect ? 1200 : 1800);
        });
        grid.appendChild(btn);
      });
    }

    function playWord() {
      if (!answer) return;
      const btn = document.getElementById('play-btn');
      btn.classList.add('playing');
      AudioManager.speak(answer.word, { rate: 0.7, onEnd: () => btn.classList.remove('playing') });
    }

    document.getElementById('play-btn').addEventListener('click', playWord);

    buildRound();
    setTimeout(playWord, 600);
  </script>
</body>
</html>
