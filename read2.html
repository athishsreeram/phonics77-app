<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Reading Level 2 · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.read2-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:580px; margin:28px auto; }
.passage { font-size:clamp(1.1rem,3.5vw,1.4rem); font-weight:700; line-height:2; color:var(--clr-text); text-align:left; margin:20px 0; }
.passage .phonics-word { color:var(--clr-primary); cursor:pointer; border-bottom:2px dotted var(--clr-primary); }
.passage .phonics-word:hover { background:#fff0f0; border-radius:4px; }
.passage-title { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--clr-primary); margin-bottom:8px; }
.passage-emoji { font-size:3rem; display:block; margin-bottom:8px; }
.level-badge { display:inline-block; background:#fef3c7; color:#92400e; border-radius:8px; padding:4px 12px; font-size:.8rem; font-weight:800; margin-bottom:16px; }
.btn-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
.tab-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
.tab-btn { background:#f3f4f6; border:3px solid transparent; border-radius:10px; padding:8px 14px; font-weight:800; font-size:.85rem; cursor:pointer; transition:all .2s; }
.tab-btn.active { background:var(--clr-primary); color:white; }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Reading Level 2</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#0891b2,#0e7490)">
  <h1>📚 Reading Level 2</h1>
  <p>Longer passages for growing readers!</p>
</div>
<main>
<div class="read2-card">
  <div class="tab-row" id="tab-row"></div>
  <span class="passage-emoji" id="p-emoji">🦆</span>
  <h2 class="passage-title" id="p-title">The Duck Pond</h2>
  <div class="level-badge">Level 2 · Blends &amp; Digraphs</div>
  <div class="passage" id="p-body"></div>
  <div class="btn-row">
    <button class="btn btn-primary btn-lg" id="btn-read">🔊 Read Aloud</button>
    <button class="btn btn-secondary" id="btn-stop">⏹ Stop</button>
  </div>
</div>
</main>
<script src="js/config.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script>
const PASSAGES = [
  {
    title:'The Duck Pond',
    emoji:'🦆',
    phonics:['duck','pond','swim','quick','splash','thick','when','that','then','them'],
    text:'A duck lived at the pond. The duck liked to swim in the thick green pond. When the sun came up, the duck would splash and swim. Then the other ducks came to swim with them. They were quick in the water. That was their best time of day.'
  },
  {
    title:'The Sheep and the Ship',
    emoji:'🐑',
    phonics:['sheep','ship','shore','shallow','shade','white','while','there'],
    text:'A white sheep stood on the shore. A big ship was far out at sea. The sheep watched the ship while it floated there. The water was shallow near the shore. The sheep found some shade under a tree. There it rested while the ship sailed away.'
  },
  {
    title:'Clark and the Dark Cave',
    emoji:'🦇',
    phonics:['clark','dark','cave','stars','far','bar','park','card','hard','sharp'],
    text:'Clark hiked far into the park. He found a dark cave in the hard rock. Inside, he saw sharp rocks and a card left by an old explorer. Clark looked at the stars on the card. It was a map! He was not far from a hidden garden bar. Clark smiled and followed the stars on the card.'
  },
];

let cur = 0;

function renderPassage() {
  const p = PASSAGES[cur];
  document.getElementById('p-emoji').textContent  = p.emoji;
  document.getElementById('p-title').textContent  = p.title;
  const body = document.getElementById('p-body');
  body.innerHTML = p.text.split(/\b/).map(w => {
    const clean = w.toLowerCase().replace(/[^a-z]/g,'');
    if(p.phonics.includes(clean)) return `<span class="phonics-word" onclick="AudioManager.speak('${clean}',{rate:.7})">${w}</span>`;
    return w;
  }).join('');
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active',i===cur));
}

function buildTabs() {
  const row = document.getElementById('tab-row');
  row.innerHTML = '';
  PASSAGES.forEach((p,i) => {
    const btn = document.createElement('button');
    btn.className=`tab-btn${i===0?' active':''}`;
    btn.textContent = p.emoji+' '+p.title.split(' ').slice(0,2).join(' ');
    btn.addEventListener('click',()=>{ cur=i; renderPassage(); });
    row.appendChild(btn);
  });
}

document.getElementById('btn-read').addEventListener('click', () => AudioManager.speak(PASSAGES[cur].text,{rate:.82}));
document.getElementById('btn-stop').addEventListener('click', () => AudioManager.stop());

buildTabs(); renderPassage();
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("read-advanced");</script>
</body>
</html>
