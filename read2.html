<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🎙️ Read + Voice · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .read-card { background:white; border-radius:32px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); margin-bottom:24px; }
    .target-sentence { font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,6vw,3.2rem); line-height:1.4; margin:16px 0 24px; }
    .word-token { display:inline-block; padding:4px 8px; border-radius:10px; transition:background 0.2s; margin:2px; }
    .word-token.matched { background:var(--clr-green); color:white; }
    .word-token.missed  { background:#ffcccc; }

    .mic-btn {
      width:clamp(100px,28vw,150px); height:clamp(100px,28vw,150px);
      border-radius:50%; border:none; cursor:pointer;
      font-size:clamp(2.5rem,10vw,4.5rem);
      box-shadow:0 6px 0 rgba(0,0,0,0.15);
      transition:transform 0.15s, box-shadow 0.15s, background 0.2s;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 20px; background:var(--clr-primary);
      -webkit-tap-highlight-color:transparent;
    }
    .mic-btn.recording { background:var(--clr-green); animation:pulse 0.8s ease infinite alternate; box-shadow:0 0 0 12px rgba(107,203,119,0.3); }
    .mic-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.15); }
    @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.08)} }

    .transcript-box { background:#f8f8f8; border-radius:16px; padding:14px 16px; min-height:52px; font-size:1.2rem; font-weight:700; color:var(--clr-text-soft); margin-bottom:16px; }
    .status-msg { font-size:1.1rem; font-weight:700; margin-bottom:12px; }
    .no-support { background:#fff3cd; border-radius:16px; padding:16px; font-size:1.1rem; font-weight:700; color:#856404; margin-bottom:20px; display:none; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Read + Voice</span>
    </div>
    <div class="nav-right"></div>
  </nav>
  <div class="page-header" style="background:linear-gradient(135deg,var(--stage5),#5dbb6a)">
    <h1>🎙️ Read + Voice</h1>
    <p>Read aloud and see your words!</p>
  </div>
  <main>
    <div class="no-support" id="no-support">
      🎤 Voice recognition is not supported on this browser. Try Chrome on desktop or Android. You can still tap the sentences to hear them!
    </div>

    <div class="read-card">
      <p style="font-size:1rem;color:var(--clr-text-soft);margin-bottom:12px">Sentence <span id="s-num">1</span> / 10</p>
      <div class="target-sentence" id="target-sentence"></div>
      <button class="btn btn-secondary" id="btn-listen" style="margin:0 auto 20px;display:flex">🔊 Hear It</button>

      <button class="mic-btn" id="mic-btn">🎤</button>
      <div class="status-msg" id="status-msg">Tap the mic to read aloud!</div>
      <div class="transcript-box" id="transcript-box">Your words will appear here...</div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="btn btn-secondary" id="btn-prev">◀ Prev</button>
        <button class="btn btn-primary"   id="btn-next-s">Next ▶</button>
      </div>
    </div>

    <div class="score-bar">
      <div class="score-item">✅ <span id="correct-count">0</span><span class="score-label"> Correct</span></div>
      <div class="score-item">⭐ <span id="stars-count">0</span><span class="score-label"> Stars</span></div>
    </div>
  </main>
  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const SENTENCES = [
      'The cat sat on a mat.','I can see a big red bus.','The dog ran in the mud.',
      'She has a pet hen at home.','A fat pig ate the bun.','The sun is up in the sky.',
      'He hit the ball with a bat.','The fish swam in the net.','I put the cup on top.',
      'The red fox hid in a den.',
    ];

    let idx = 0, correctCount = 0, recording = false;
    let recognition = null;

    // Check speech recognition support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      document.getElementById('no-support').style.display = 'block';
    } else {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = false;
      recognition.interimResults = true;

      recognition.onresult = (e) => {
        const transcript = Array.from(e.results).map(r => r[0].transcript).join(' ').toLowerCase().trim();
        document.getElementById('transcript-box').textContent = transcript;
        if (e.results[0].isFinal) checkMatch(transcript);
      };
      recognition.onend = () => {
        recording = false;
        document.getElementById('mic-btn').classList.remove('recording');
        document.getElementById('mic-btn').textContent = '🎤';
        document.getElementById('status-msg').textContent = 'Tap the mic to read aloud!';
      };
      recognition.onerror = () => {
        recording = false;
        document.getElementById('mic-btn').classList.remove('recording');
        document.getElementById('status-msg').textContent = '❌ Could not hear — try again!';
      };
    }

    function showSentence() {
      const sentence = SENTENCES[idx];
      document.getElementById('s-num').textContent = idx + 1;
      document.getElementById('transcript-box').textContent = 'Your words will appear here...';
      document.getElementById('status-msg').textContent = 'Tap the mic to read aloud!';

      const words = sentence.replace(/\./g,'').split(' ');
      const container = document.getElementById('target-sentence');
      container.innerHTML = '';
      words.forEach(w => {
        const span = document.createElement('span');
        span.className = 'word-token';
        span.dataset.word = w.toLowerCase();
        span.textContent = w + ' ';
        container.appendChild(span);
      });
    }

    function checkMatch(transcript) {
      const tokens = document.querySelectorAll('.word-token');
      let matched = 0;
      tokens.forEach(t => {
        const w = t.dataset.word.replace(/[.,!?]/g,'');
        if (transcript.includes(w)) { t.classList.add('matched'); matched++; }
        else { t.classList.add('missed'); }
      });
      const pct = matched / tokens.length;
      if (pct >= 0.7) {
        document.getElementById('status-msg').textContent = '🎉 Great reading!';
        AudioManager.playTone('star');
        UI.showFeedback(true);
        correctCount++;
        document.getElementById('correct-count').textContent = correctCount;
        document.getElementById('stars-count').textContent = Math.floor(correctCount / 2);
        UI.setScore('read2', {stars: Math.floor(correctCount/2), total: correctCount});
      } else {
        document.getElementById('status-msg').textContent = '💪 Try again!';
        AudioManager.playTone('wrong');
      }
    }

    document.getElementById('mic-btn').addEventListener('click', () => {
      if (!recognition) return;
      if (recording) { recognition.stop(); return; }
      recording = true;
      document.getElementById('mic-btn').classList.add('recording');
      document.getElementById('mic-btn').textContent = '🛑';
      document.getElementById('status-msg').textContent = '🎤 Listening...';
      // Reset highlights
      document.querySelectorAll('.word-token').forEach(t => t.classList.remove('matched','missed'));
      document.getElementById('transcript-box').textContent = '...';
      recognition.start();
    });

    document.getElementById('btn-listen').addEventListener('click', () => {
      AudioManager.speak(SENTENCES[idx], {rate:0.7});
    });
    document.getElementById('btn-prev').addEventListener('click', () => {
      idx = (idx - 1 + SENTENCES.length) % SENTENCES.length;
      showSentence(); AudioManager.playTone('click');
    });
    document.getElementById('btn-next-s').addEventListener('click', () => {
      idx = (idx + 1) % SENTENCES.length;
      showSentence(); AudioManager.playTone('click');
    });

    showSentence();
  </script>
</body>
</html>
