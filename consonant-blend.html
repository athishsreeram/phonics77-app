<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 Consonant Blends · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.blend-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:14px; margin:16px 0; }
.blend-chip {
  background:white; border-radius:18px; padding:18px 10px; text-align:center;
  box-shadow:var(--shadow-sm); cursor:pointer; border:3px solid transparent;
  transition:all .2s;
}
.blend-chip:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--clr-secondary); }
.blend-chip.playing { border-color:var(--clr-primary); transform:scale(1.05); }
.blend-pair { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--clr-primary); }
.blend-emoji { font-size:1.8rem; margin:4px 0; display:block; }
.blend-word  { font-size:.8rem; font-weight:800; color:var(--clr-text-soft); }
.mode-toggle { display:flex; gap:8px; justify-content:center; margin-bottom:12px; }
.mode-btn { background:#f3f4f6; border:3px solid #e5e7eb; border-radius:12px; padding:8px 16px; font-weight:800; font-size:.9rem; cursor:pointer; }
.mode-btn.active { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
.group-filter { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; }
.grp-btn { background:#f3f4f6; border:2px solid #e5e7eb; border-radius:10px; padding:6px 14px; font-weight:800; font-size:.82rem; cursor:pointer; }
.grp-btn.active { background:#667eea; color:white; border-color:#667eea; }
/* Quiz */
.quiz-card { background:white; border-radius:28px; padding:32px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:500px; margin:0 auto; }
.quiz-word { font-family:'Fredoka One',cursive; font-size:clamp(2.5rem,10vw,5rem); color:var(--clr-text); margin:16px 0; }
.blend-choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:360px; margin:16px auto 0; }
.bchoice { background:#f3f4f6; border:3px solid transparent; border-radius:14px; padding:14px;
  font-family:'Fredoka One',cursive; font-size:1.6rem; cursor:pointer; transition:all .15s; }
.bchoice.correct { background:#dcfce7; border-color:var(--clr-green); }
.bchoice.wrong   { background:#fee2e2; border-color:var(--clr-primary); }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">Consonant Blends</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#10b981,#065f46)">
  <h1>🔗 Consonant Blends</h1>
  <p>Tap a blend to hear it — then take the quiz!</p>
</div>
<main>
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-browse">📖 Study</button>
    <button class="mode-btn" id="mode-quiz">🎯 Quiz</button>
  </div>

  <!-- Browse -->
  <div id="browse-section">
    <div class="group-filter">
      <button class="grp-btn active" data-group="all">All 22</button>
      <button class="grp-btn" data-group="l">L-blends</button>
      <button class="grp-btn" data-group="r">R-blends</button>
      <button class="grp-btn" data-group="s">S-blends</button>
      <button class="grp-btn" data-group="other">Other</button>
    </div>
    <div class="blend-grid" id="blend-grid"></div>
  </div>

  <!-- Quiz -->
  <div id="quiz-section" style="display:none">
    <div class="quiz-card">
      <p style="font-weight:700;color:var(--clr-text-soft);margin-bottom:8px" id="q-label">Question 1 of 12</p>
      <div class="progress-wrap" style="margin-bottom:16px">
        <div class="progress-bar" id="q-bar" style="width:8%"></div>
      </div>
      <div style="font-size:3.5rem" id="q-emoji">🔵</div>
      <div class="quiz-word" id="q-word">blue</div>
      <p style="font-weight:700;color:var(--clr-text-soft)">Which blend starts this word?</p>
      <button class="btn btn-primary" id="q-speak" style="margin:12px auto;display:block">🔊 Hear Word</button>
      <div class="blend-choices" id="blend-choices"></div>
      <p style="font-weight:700;margin-top:16px">Score: <span id="q-score">0</span>/<span id="q-total">0</span></p>
    </div>
  </div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/materials.js"></script>
<script src="js/ui.js"></script>
<script>
const BLENDS = PHONICS_DATA.consonantBlends;
const GROUPS = {
  l: ['bl','cl','fl','gl','pl','sl'],
  r: ['br','cr','dr','fr','gr','pr','tr','wr'],
  s: ['sc','sk','sl','sm','sn','sp','st','sw'],
  other: ['tw'],
};

let currentGroup = 'all';

function getGroupBlends(g) {
  if (g === 'all') return BLENDS;
  if (g === 'other') return BLENDS.filter(b => !Object.values(GROUPS).flat().includes(b.blend) || GROUPS.other.includes(b.blend));
  return BLENDS.filter(b => GROUPS[g] && GROUPS[g].includes(b.blend));
}

function renderGrid() {
  const grid = document.getElementById('blend-grid');
  grid.innerHTML = '';
  getGroupBlends(currentGroup).forEach((b, i) => {
    const hue = (i * 16) % 360;
    const chip = document.createElement('div');
    chip.className = 'blend-chip';
    chip.innerHTML = `<div class="blend-pair" style="color:hsl(${hue},65%,45%)">${b.blend.toUpperCase()}</div><span class="blend-emoji">${b.emoji}</span><div class="blend-word">${b.word}</div>`;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.blend-chip').forEach(c => c.classList.remove('playing'));
      chip.classList.add('playing');
      AudioManager.speak(`${b.blend}. ${b.word}`, {rate:.8});
      setTimeout(() => chip.classList.remove('playing'), 1200);
    });
    grid.appendChild(chip);
  });
}

// Group filter buttons
document.querySelectorAll('.grp-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.grp-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentGroup = btn.dataset.group;
    renderGrid();
  });
});

renderGrid();

// Quiz mode
let qIdx = 0, qScore = 0, qTotal = 0, qAnswered = false;
const shuffledQ = UI.shuffle(BLENDS).slice(0, 12);

function loadQuizQ() {
  if (qIdx >= shuffledQ.length) { endQuiz(); return; }
  qAnswered = false;
  const q = shuffledQ[qIdx];
  document.getElementById('q-label').textContent = `Question ${qIdx+1} of ${shuffledQ.length}`;
  UI.updateProgress(document.getElementById('q-bar'), qIdx+1, shuffledQ.length);
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-word').textContent = q.word;
  document.getElementById('q-speak').onclick = () => AudioManager.speak(q.word, {rate:.75});

  const wrongs = UI.shuffle(BLENDS.filter(b=>b.blend!==q.blend)).slice(0,3);
  const opts = UI.shuffle([q, ...wrongs]);
  const bc = document.getElementById('blend-choices');
  bc.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'bchoice'; btn.textContent = opt.blend.toUpperCase();
    btn.addEventListener('click', () => {
      if(qAnswered) return; qAnswered=true; qTotal++;
      const right = opt.blend === q.blend;
      btn.classList.add(right?'correct':'wrong');
      if(right){qScore++;AudioManager.playTone('correct');UI.showFeedback(true);}
      else{AudioManager.playTone('wrong');bc.querySelectorAll('.bchoice').forEach(b=>{if(b.textContent===q.blend.toUpperCase())b.classList.add('correct');});}
      document.getElementById('q-score').textContent=qScore;
      document.getElementById('q-total').textContent=qTotal;
      bc.querySelectorAll('.bchoice').forEach(b=>b.style.pointerEvents='none');
      qIdx++;setTimeout(loadQuizQ,1400);
    });
    bc.appendChild(btn);
  });
  AudioManager.speak(q.word,{rate:.75});
}

function endQuiz() {
  const pct=Math.round((qScore/shuffledQ.length)*100);
  document.getElementById('quiz-section').innerHTML=`
    <div class="quiz-card">
      <div style="font-size:4rem;margin-bottom:16px">${pct>=80?'🏆':'⭐'}</div>
      <h2 style="font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:8px">${pct>=80?'Blend Master!':'Keep Practising!'}</h2>
      <p style="color:#666;margin-bottom:24px">Score: ${qScore}/${shuffledQ.length} (${pct}%)</p>
      <button class="btn btn-primary btn-lg" onclick="location.reload()">🔄 Try Again</button>
      <br><br><a href="index.html" class="btn btn-secondary">🏠 Home</a>
    </div>`;
  if(typeof analytics!=='undefined') analytics.trackActivityComplete('consonant-blends',qScore,shuffledQ.length);
  if (window.CurriculumManager) window.CurriculumManager.markActivityComplete('consonant-blends');
}

document.getElementById('mode-browse').addEventListener('click',()=>{
  document.getElementById('mode-browse').classList.add('active');
  document.getElementById('mode-quiz').classList.remove('active');
  document.getElementById('browse-section').style.display='block';
  document.getElementById('quiz-section').style.display='none';
});
document.getElementById('mode-quiz').addEventListener('click',()=>{
  document.getElementById('mode-quiz').classList.add('active');
  document.getElementById('mode-browse').classList.remove('active');
  document.getElementById('browse-section').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  if(qIdx===0) loadQuizQ();
});
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("consonant-blends");
window.addEventListener('beforeunload', function() {
  if(typeof analytics!=="undefined") analytics.trackActivityComplete("consonant-blends", 0, 10);
  if (window.CurriculumManager) window.CurriculumManager.markActivityComplete('consonant-blends');
});</script>
</body>
</html>
