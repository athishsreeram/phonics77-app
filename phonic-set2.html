<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 R-Controlled Vowels · Phonics Hub</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.r-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:14px; margin:24px 0; }
.r-card { background:white; border-radius:18px; padding:20px 12px; text-align:center; box-shadow:var(--shadow-sm); cursor:pointer; border:3px solid transparent; transition:all .2s; }
.r-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--clr-primary); }
.r-big { font-family:'Fredoka One',cursive; font-size:2.4rem; color:var(--clr-primary); }
.r-words { font-size:.8rem; font-weight:700; color:var(--clr-text-soft); margin-top:6px; line-height:1.5; }
.mode-toggle { display:flex; gap:8px; justify-content:center; margin-bottom:20px; }
.mode-btn { background:#f3f4f6; border:3px solid #e5e7eb; border-radius:12px; padding:8px 16px; font-weight:800; font-size:.9rem; cursor:pointer; }
.mode-btn.active { background:var(--clr-primary); color:white; border-color:var(--clr-primary); }
.quiz-card { background:white; border-radius:28px; padding:36px 24px; text-align:center; box-shadow:var(--shadow-md); max-width:520px; margin:28px auto; }
.quiz-word { font-family:'Fredoka One',cursive; font-size:clamp(2.5rem,10vw,5rem); color:var(--clr-text); margin:16px 0; }
.quiz-blank { color:var(--clr-primary); border-bottom:4px solid var(--clr-primary); min-width:48px; display:inline-block; }
.r-choices { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
.r-choice { background:#f3f4f6; border:3px solid transparent; border-radius:14px; padding:12px 18px;
  font-family:'Fredoka One',cursive; font-size:1.6rem; cursor:pointer; transition:all .15s; }
.r-choice.correct { background:#dcfce7; border-color:var(--clr-green); }
.r-choice.wrong   { background:#fee2e2; border-color:var(--clr-primary); }
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="nav-home-btn">🏠</a>
    <span class="nav-title">R-Controlled Vowels</span>
  </div>
</nav>
<div class="page-header" style="background:linear-gradient(135deg,#f43f5e,#be123c)">
  <h1>🎯 R-Controlled Vowels</h1>
  <p>When R joins a vowel, it changes the sound!</p>
</div>
<main>
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-browse">📖 Study</button>
    <button class="mode-btn" id="mode-quiz">🎯 Quiz</button>
  </div>

  <!-- Browse mode -->
  <div id="browse-section">
    <p style="text-align:center;font-weight:700;color:var(--clr-text-soft);margin-bottom:12px">Tap a card to hear the sound and example words.</p>
    <div class="r-grid" id="r-grid"></div>
  </div>

  <!-- Quiz mode -->
  <div id="quiz-section" style="display:none">
    <div class="quiz-card">
      <p style="font-weight:700;color:var(--clr-text-soft);margin-bottom:8px" id="q-label">Question 1 of 10</p>
      <div class="progress-wrap" style="margin-bottom:20px">
        <div class="progress-bar" id="q-bar" style="width:10%"></div>
      </div>
      <div style="font-size:3rem;margin-bottom:8px" id="q-emoji">🚗</div>
      <div class="quiz-word" id="q-word">c<span class="quiz-blank">__</span></div>
      <p style="font-weight:700;color:var(--clr-text-soft)">Which r-vowel pattern completes this word?</p>
      <button class="btn btn-primary" id="q-speak" style="margin:12px auto;display:block">🔊 Hear Word</button>
      <div class="r-choices" id="r-choices"></div>
      <p style="font-weight:700;margin-top:16px">Score: <span id="q-score">0</span>/<span id="q-total">0</span></p>
    </div>
  </div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script>
const R_VOWELS = [
  { pair:'AR', sound:'ar (like car)',    words:['car','star','farm','park','dart','barn'],   emoji:'🚗' },
  { pair:'ER', sound:'er (like her)',    words:['her','fern','verb','stern','clerk','term'],  emoji:'🌿' },
  { pair:'IR', sound:'ir (like bird)',   words:['bird','girl','shirt','stir','sir','dirt'],   emoji:'🐦' },
  { pair:'OR', sound:'or (like corn)',   words:['corn','fork','storm','short','horn','cord'], emoji:'🌽' },
  { pair:'UR', sound:'ur (like fur)',    words:['fur','burn','curl','turn','purse','hurt'],   emoji:'🐱' },
];
const COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#6366f1'];

// Build all quiz words from all patterns
const QUIZ_WORDS = R_VOWELS.flatMap(rv =>
  rv.words.map(w => ({ word: w, pair: rv.pair, emoji: rv.emoji, sound: rv.sound }))
);

// Browse mode
const grid = document.getElementById('r-grid');
R_VOWELS.forEach((rv, i) => {
  const card = document.createElement('div');
  card.className = 'r-card';
  card.innerHTML = `<div class="r-big" style="color:${COLORS[i]}">${rv.pair}</div><div style="font-size:2rem;margin:4px 0">${rv.emoji}</div><div class="r-words">${rv.words.slice(0,4).join(' · ')}</div>`;
  card.addEventListener('click', () => {
    AudioManager.speak(`${rv.pair}. ${rv.sound}. For example: ${rv.words.slice(0,3).join(', ')}`, {rate:.8});
    card.style.borderColor = COLORS[i];
    setTimeout(()=>card.style.borderColor='transparent',2000);
  });
  grid.appendChild(card);
});

// Quiz mode
let qIdx = 0, qScore = 0, qTotal = 0, qAnswered = false;
const shuffledQ = UI.shuffle(QUIZ_WORDS).slice(0, 10);

function loadQuizQ() {
  if (qIdx >= shuffledQ.length) { endQuiz(); return; }
  qAnswered = false;
  const q = shuffledQ[qIdx];
  document.getElementById('q-label').textContent = `Question ${qIdx+1} of ${shuffledQ.length}`;
  UI.updateProgress(document.getElementById('q-bar'), qIdx+1, shuffledQ.length);
  document.getElementById('q-emoji').textContent = q.emoji;
  // Show word with blank where pair would be
  const blank = q.word.replace(q.pair.toLowerCase(), '<span class="quiz-blank">__</span>');
  document.getElementById('q-word').innerHTML = blank === q.word
    ? q.word.slice(0, -2) + '<span class="quiz-blank">__</span>'
    : blank;
  document.getElementById('q-speak').onclick = () => AudioManager.speak(q.word, {rate:.75});

  const wrongs = UI.shuffle(R_VOWELS.filter(rv=>rv.pair!==q.pair)).slice(0,3);
  const correct = R_VOWELS.find(rv=>rv.pair===q.pair);
  const opts = UI.shuffle([correct, ...wrongs]);
  const rc = document.getElementById('r-choices');
  rc.innerHTML='';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className='r-choice'; btn.textContent=opt.pair;
    btn.addEventListener('click', ()=>{
      if(qAnswered) return; qAnswered=true; qTotal++;
      const right = opt.pair===q.pair;
      btn.classList.add(right?'correct':'wrong');
      if(right){qScore++;AudioManager.playTone('correct');UI.showFeedback(true);}
      else{AudioManager.playTone('wrong');rc.querySelectorAll('.r-choice').forEach(b=>{if(b.textContent===q.pair)b.classList.add('correct');});}
      document.getElementById('q-score').textContent=qScore;
      document.getElementById('q-total').textContent=qTotal;
      rc.querySelectorAll('.r-choice').forEach(b=>b.style.pointerEvents='none');
      qIdx++;setTimeout(loadQuizQ,1400);
    });
    rc.appendChild(btn);
  });
  AudioManager.speak(q.word,{rate:.75});
}

function endQuiz() {
  const pct=Math.round((qScore/shuffledQ.length)*100);
  document.getElementById('quiz-section').innerHTML=`
    <div class="quiz-card">
      <div style="font-size:4rem;margin-bottom:16px">${pct>=80?'🏆':'⭐'}</div>
      <h2 style="font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:8px">${pct>=80?'R-Vowel Master!':'Keep Practising!'}</h2>
      <p style="color:#666;margin-bottom:24px">Score: ${qScore}/${shuffledQ.length} (${pct}%)</p>
      <button class="btn btn-primary btn-lg" onclick="location.reload()">🔄 Try Again</button>
      <br><br><a href="index.html" class="btn btn-secondary">🏠 Home</a>
    </div>`;
  if(typeof analytics!=='undefined') analytics.trackActivityComplete('r-controlled-vowels',qScore,shuffledQ.length);
}

document.getElementById('mode-browse').addEventListener('click',()=>{
  document.getElementById('mode-browse').classList.add('active');
  document.getElementById('mode-quiz').classList.remove('active');
  document.getElementById('browse-section').style.display='block';
  document.getElementById('quiz-section').style.display='none';
});
document.getElementById('mode-quiz').addEventListener('click',()=>{
  document.getElementById('mode-quiz').classList.add('active');
  document.getElementById('mode-browse').classList.remove('active');
  document.getElementById('browse-section').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  if(qIdx===0) loadQuizQ();
});
</script>
<script>if(typeof analytics!=="undefined")analytics.trackActivityStart("r-controlled-vowels");
window.addEventListener('beforeunload', function() {
  if(typeof analytics!=="undefined") analytics.trackActivityComplete("r-controlled-vowels", 0, 10);
});</script>
</body>
</html>
