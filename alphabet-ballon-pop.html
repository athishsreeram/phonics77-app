<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🎈 Balloon Pop · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    body { overflow-x: hidden; }
    .game-header { background:linear-gradient(135deg,#4ECDC4,#a8edea); padding:20px; text-align:center; }
    .game-header h1 { font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,6vw,3rem); color:white; text-shadow:0 2px 8px rgba(0,0,0,0.2); }
    .target-display { background:white; border-radius:24px; padding:16px 24px; text-align:center; margin:16px; box-shadow:var(--shadow-md); }
    .target-label { font-size:1.1rem; color:var(--clr-text-soft); font-weight:700; }
    .target-letter { font-family:'Fredoka One',cursive; font-size:clamp(3rem,14vw,7rem); color:var(--clr-primary); line-height:1; }
    .game-area { position:relative; width:100%; height:60vh; min-height:300px; background:linear-gradient(180deg,#e0f7fa,#b2ebf2); overflow:hidden; border-radius:20px; margin:0 16px; width:calc(100% - 32px); }
    .balloon { position:absolute; cursor:pointer; transition:none; -webkit-tap-highlight-color:transparent; user-select:none; animation:rise linear forwards; }
    @keyframes rise { from { transform:translateY(0); } to { transform:translateY(-110vh); } }
    .balloon-body { width:clamp(60px,16vw,90px); height:clamp(72px,20vw,110px); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:clamp(1.6rem,6vw,2.4rem); color:white; text-shadow:0 1px 4px rgba(0,0,0,0.3); box-shadow:inset -6px -6px 12px rgba(0,0,0,0.1), inset 4px 4px 8px rgba(255,255,255,0.3); position:relative; }
    .balloon-body::after { content:''; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:14px solid currentColor; }
    .balloon-string { width:2px; height:30px; background:#aaa; margin:0 auto; }
    .pop-burst { position:absolute; pointer-events:none; font-size:3rem; animation:burst 0.5s ease forwards; }
    @keyframes burst { 0%{transform:scale(0);opacity:1} 100%{transform:scale(2);opacity:0} }

    .controls-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:16px; }
    .score-display { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; padding:12px 20px; background:white; border-radius:20px; margin:0 16px 24px; box-shadow:var(--shadow-sm); }
    .score-item-big { font-family:'Fredoka One',cursive; font-size:1.6rem; display:flex; align-items:center; gap:8px; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Balloon Pop</span>
    </div>
    <div class="nav-right"></div>
  </nav>

  <div class="game-header">
    <h1>🎈 Balloon Pop!</h1>
  </div>

  <div class="target-display">
    <div class="target-label">Pop the balloon with the letter:</div>
    <div class="target-letter" id="target-letter">A</div>
    <button class="btn btn-primary" id="btn-say-target" style="margin:8px auto 0;display:flex">🔊 Say it</button>
  </div>

  <div class="game-area" id="game-area"></div>

  <div class="controls-row">
    <button class="btn btn-green btn-lg" id="btn-start">▶️ Start</button>
    <button class="btn btn-accent btn-lg" id="btn-pause">⏸ Pause</button>
  </div>

  <div class="score-display">
    <div class="score-item-big">✅ <span id="score">0</span></div>
    <div class="score-item-big">❌ <span id="misses">0</span></div>
    <div class="score-item-big">⭐ <span id="stars">0</span></div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const BALLOON_COLORS = ['#FF6B35','#4ECDC4','#A78BFA','#6BCB77','#FF85A1','#4D96FF','#FFB347','#FF6B80'];

    let target = 'A', score = 0, misses = 0, stars = 0;
    let running = false, spawnTimer = null, balloons = [];

    function newTarget() {
      target = LETTERS[Math.floor(Math.random() * LETTERS.length)];
      document.getElementById('target-letter').textContent = target;
      AudioManager.speak(target, {rate:0.7});
    }

    function spawnBalloon() {
      if (!running) return;
      const area = document.getElementById('game-area');
      const isTarget = Math.random() < 0.4;
      const letter = isTarget ? target : LETTERS[Math.floor(Math.random() * LETTERS.length)];
      const color  = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
      const x      = 5 + Math.random() * 80;
      const dur    = 4 + Math.random() * 4;

      const wrap = document.createElement('div');
      wrap.className = 'balloon';
      wrap.style.cssText = `left:${x}%;bottom:0;animation-duration:${dur}s`;

      const body = document.createElement('div');
      body.className = 'balloon-body';
      body.style.background = color;
      body.style.color = color;
      body.style.color = 'white';
      body.innerHTML = `<span style="position:relative;z-index:1">${letter}</span>`;

      const string = document.createElement('div');
      string.className = 'balloon-string';

      wrap.appendChild(body);
      wrap.appendChild(string);

      wrap.addEventListener('click', (e) => {
        if (!running) return;
        if (letter === target) {
          // Correct pop
          score++;
          stars = Math.floor(score / 3);
          document.getElementById('score').textContent  = score;
          document.getElementById('stars').textContent  = stars;
          AudioManager.playTone('pop');
          AudioManager.playTone('correct');
          // Burst animation
          const burst = document.createElement('div');
          burst.className = 'pop-burst';
          burst.textContent = '💥';
          burst.style.cssText = `left:${x}%;bottom:50%;`;
          area.appendChild(burst);
          setTimeout(() => burst.remove(), 500);
          wrap.remove();
          if (score % 5 === 0) newTarget();
          if (score % 10 === 0) UI.showFeedback(true, 900);
          UI.setScore('balloon_pop', {stars, total: score});
        } else {
          // Wrong — shake it
          misses++;
          document.getElementById('misses').textContent = misses;
          AudioManager.playTone('wrong');
          wrap.style.animation = 'none';
          wrap.style.transform = 'rotate(-10deg)';
          setTimeout(() => { wrap.style.transform = 'rotate(10deg)'; }, 150);
          setTimeout(() => { wrap.style.transform = ''; wrap.style.animation = `rise ${dur}s linear forwards`; }, 300);
        }
      });

      area.appendChild(wrap);
      balloons.push(wrap);

      // Clean up when balloon exits
      wrap.addEventListener('animationend', () => {
        if (wrap.parentNode) {
          if (letter === target) {
            // Escaped target
            misses++;
            document.getElementById('misses').textContent = misses;
          }
          wrap.remove();
        }
      });

      // Schedule next
      const interval = Math.max(600, 1500 - score * 20);
      spawnTimer = setTimeout(spawnBalloon, interval);
    }

    document.getElementById('btn-start').addEventListener('click', () => {
      if (running) return;
      running = true;
      document.getElementById('btn-start').textContent = '🔄 Restart';
      score = 0; misses = 0; stars = 0;
      document.getElementById('score').textContent  = 0;
      document.getElementById('misses').textContent = 0;
      document.getElementById('stars').textContent  = 0;
      document.getElementById('game-area').innerHTML = '';
      newTarget();
      spawnBalloon();
    });

    document.getElementById('btn-pause').addEventListener('click', () => {
      running = !running;
      document.getElementById('btn-pause').textContent = running ? '⏸ Pause' : '▶️ Resume';
      if (running) spawnBalloon();
      else clearTimeout(spawnTimer);
      AudioManager.playTone('click');
    });

    document.getElementById('btn-say-target').addEventListener('click', () => {
      AudioManager.speak(target, {rate:0.7});
    });
  </script>
</body>
</html>
