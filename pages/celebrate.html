<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎉 Celebration · Phonics Hub</title>
<link rel="stylesheet" href="/css/shared.css">
<style>
body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:linear-gradient(180deg,#fff8ec,#fff);} 
.celebrate {background:white;border-radius:24px;padding:28px;max-width:720px;width:92%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.12)}
.mascot{font-size:6rem}
.stars{position:relative;margin:14px 0}
.starburst{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 50% 40%, #fff 30%, #fff0 31%), conic-gradient(#ffd166, #ffd166 20%, #ff6b6b 20%, #ff6b6b 40%, #ffd166 40%);margin:0 auto;animation:burst .9s ease-out}
@keyframes burst{from{transform:scale(.6) rotate(0);opacity:0}to{transform:scale(1) rotate(12deg);opacity:1}}
.msg{font-size:1.4rem;font-weight:800;margin-top:8px}
.sub{color:#666;margin-top:8px}
.btns{display:flex;gap:12px;justify-content:center;margin-top:18px}
.btn-home{background:#667eea;color:white;padding:10px 14px;border-radius:12px;border:none;font-weight:800}
</style>
</head>
<body>
<div class="celebrate">
  <div class="mascot">🦉</div>
  <div class="starburst" aria-hidden="true"></div>
  <div class="msg" id="msg">🎉 Great job!</div>
  <div class="sub" id="sub">You completed today's session</div>
  <div class="btns">
    <button class="btn-home" onclick="location.href='/index.html'">Home</button>
  </div>
</div>
<script>
(function(){
  const profile = (window.analytics && analytics.getProfile && analytics.getProfile()) || {};
  const name = profile.childName || 'Your child';
  const streak = parseInt(localStorage.getItem('ph_streak')||'0',10) || 1;
  document.getElementById('msg').textContent = `🎉 Great job, ${name}!`;
  document.getElementById('sub').textContent = `Streak: ${streak} day${streak===1?'':'s'} — See you tomorrow!`;
})();
</script>
</body>
</html>
