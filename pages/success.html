<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Premium Unlocked! · Phonics Hub</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
body { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
       background:linear-gradient(135deg,#667eea,#764ba2); }
.success-card { background:white;border-radius:28px;padding:48px 28px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);max-width:460px;width:100%;animation:fadeIn .5s ease; }
.icon { font-size:5rem;display:block;margin-bottom:16px; }
h1 { font-family:'Fredoka One',cursive;font-size:2.2rem;color:#667eea;margin-bottom:8px; }
.sub { font-size:1rem;color:#666;margin-bottom:20px; }
.perks { list-style:none;text-align:left;margin:20px 0;display:flex;flex-direction:column;gap:10px; }
.perks li { display:flex;align-items:center;gap:10px;font-weight:700;font-size:.95rem; }
.go-btn { display:block;width:100%;padding:16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);color:white;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;
  cursor:pointer;text-decoration:none;margin-top:8px;transition:transform .2s,box-shadow .2s; }
.go-btn:hover { transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,.4); }
.status { font-size:.85rem;color:#22c55e;font-weight:700;margin-top:12px;min-height:20px; }
</style>
</head>
<body>
<div class="success-card">
  <span class="icon">🎉</span>
  <h1>Premium Unlocked!</h1>
  <p class="sub">All 19+ phonics activities are now available.</p>
  <ul class="perks">
    <li>✅ 19+ interactive phonics activities</li>
    <li>🔊 Text-to-speech on every activity</li>
    <li>📊 Parent dashboard &amp; progress tracking</li>
    <li>🚫 Zero ads, zero tracking</li>
    <li>📴 Works offline</li>
  </ul>
  <a href="../index.html" class="go-btn" id="go-btn">🚀 Start Learning Now!</a>
  <p class="status" id="status">Activating premium…</p>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
(async () => {
  const statusEl  = document.getElementById('status');
  const btn       = document.getElementById('go-btn');
  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  // Step 1: Set premium in localStorage immediately so UI unlocks now
  localStorage.setItem('ph_premium',    'true');
  localStorage.setItem('ph_premium_ts', Date.now().toString());
  statusEl.textContent = '✅ Premium saved to this browser';

  // Step 2: Start countdown
  let countdown = 4;
  const tick = () => {
    btn.textContent = `🚀 Start Learning! (${countdown}s)`;
    if (countdown <= 0) { window.location.href = '../index.html'; return; }
    countdown--;
    setTimeout(tick, 1000);
  };
  tick();

  // Step 3: Verify with Render API — this writes to subscriptions + users tables
  if (!sessionId) {
    statusEl.textContent = '✅ Premium active';
    return;
  }

  try {
    // verifySession calls GET /api/subscriptions/verify?session_id=...&email=...
    // The backend:
    //   1. Retrieves the Stripe session
    //   2. Upserts users.status = 'active' or 'trialing'
    //   3. Inserts row into subscriptions table
    const data = await PhonicsAPI.verifySession(sessionId);

    if (data && data.active) {
      statusEl.textContent = '✅ Subscription verified & saved';

      // Step 4: If Stripe returned the customer email, register/update user
      const stripeEmail = data.customer?.email;
      if (stripeEmail) {
        localStorage.setItem('ph_email', stripeEmail);
        // Upsert user with active status — also writes to email_leads
        await PhonicsAPI.registerUser(stripeEmail, null, null);
      }

      // Step 5: Log purchase_complete event to events table
      PhonicsAPI.logEvent('purchase_complete', {
        data: {
          session_id: sessionId,
          status:     data.status,
          email:      stripeEmail || localStorage.getItem('ph_email') || null,
        },
      });

    } else {
      statusEl.textContent = '⚠️ Payment pending — premium will activate shortly';
    }

  } catch(e) {
    // API unavailable — localStorage premium is enough to unlock
    console.warn('[success] API verify failed:', e.message);
    statusEl.textContent = '✅ Premium active (offline mode)';
  }
})();
</script>
</body>
</html>
