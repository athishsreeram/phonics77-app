<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🧩 Sentence Builder · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .sentence-zone {
      background:white; border-radius:24px; min-height:100px; padding:16px 20px;
      box-shadow:var(--shadow-md); margin-bottom:20px; display:flex; flex-wrap:wrap;
      gap:10px; align-items:center; border:4px dashed #eee;
    }
    .sentence-zone.has-words { border-color:var(--clr-secondary); }
    .zone-placeholder { color:#ccc; font-size:1.2rem; font-weight:700; font-family:'Fredoka One',cursive; }
    .built-word {
      background:var(--clr-secondary); color:white; border-radius:14px;
      padding:10px 18px; font-family:'Fredoka One',cursive;
      font-size:clamp(1.2rem,4vw,1.6rem); cursor:pointer;
      transition:all 0.15s; box-shadow:0 3px 0 rgba(0,0,0,0.15);
    }
    .built-word:active { transform:scale(0.93); box-shadow:none; }

    .word-bank { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:24px; }
    .bank-word {
      background:white; border:3px solid var(--clr-blue); border-radius:14px;
      padding:12px 20px; font-family:'Fredoka One',cursive;
      font-size:clamp(1.2rem,4vw,1.6rem); cursor:pointer;
      transition:all 0.15s; box-shadow:0 3px 0 rgba(78,205,196,0.2);
    }
    .bank-word:active  { transform:scale(0.93); }
    .bank-word:hover   { background:#f0fefe; border-color:var(--clr-secondary); }
    .bank-word.used    { opacity:0.35; pointer-events:none; }

    .sentence-check {
      background:white; border-radius:20px; padding:16px 20px; box-shadow:var(--shadow-sm);
      text-align:center; font-family:'Fredoka One',cursive; font-size:1.3rem; margin-bottom:20px; display:none;
    }
    .sentence-check.show { display:block; animation:fadeIn 0.3s ease; }
    .sentence-check.correct-msg { background:#f0fdf4; color:var(--clr-green); border:3px solid var(--clr-green); }
    .sentence-check.wrong-msg   { background:#fff0f0; color:var(--clr-primary); border:3px solid var(--clr-primary); }

    .challenges-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
    .challenge-btn { background:white; border:3px solid #eee; border-radius:16px; padding:14px 12px; text-align:center; cursor:pointer; font-family:'Fredoka One',cursive; font-size:1rem; transition:all 0.15s; }
    .challenge-btn.active { border-color:var(--clr-primary); background:#fff8f5; }
    .challenge-btn:active { transform:scale(0.95); }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Sentence Builder</span>
    </div>
    <div class="nav-right"></div>
  </nav>
  <div class="page-header" style="background:linear-gradient(135deg,var(--stage6),#ffaac1)">
    <h1>🧩 Sentence Builder</h1>
    <p>Put the words in the right order!</p>
  </div>
  <main>
    <!-- Challenge selector -->
    <div style="margin-top:20px">
      <h3 style="font-family:'Fredoka One',cursive;font-size:1.3rem;margin-bottom:12px;text-align:center">Choose a sentence:</h3>
      <div class="challenges-grid" id="challenges-grid"></div>
    </div>

    <!-- Target hint -->
    <div style="background:var(--clr-accent);border-radius:16px;padding:12px 16px;margin-bottom:16px;text-align:center;font-size:1.1rem;font-weight:700;display:none" id="hint-bar">
      📖 Hint: <span id="hint-text"></span>
    </div>

    <!-- Build zone -->
    <div class="sentence-zone" id="sentence-zone">
      <span class="zone-placeholder">Tap words below to build your sentence!</span>
    </div>

    <!-- Check result -->
    <div class="sentence-check" id="check-msg"></div>

    <!-- Word bank -->
    <div class="word-bank" id="word-bank"></div>

    <!-- Actions -->
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px">
      <button class="btn btn-primary btn-lg" id="btn-check">✅ Check!</button>
      <button class="btn btn-accent  btn-lg" id="btn-hint">💡 Hint</button>
      <button class="btn btn-secondary btn-lg" id="btn-clear-s">🗑️ Clear</button>
      <button class="btn btn-green btn-lg" id="btn-read-s">🔊 Read</button>
    </div>

    <div class="score-bar">
      <div class="score-item">✅ <span id="correct-count">0</span><span class="score-label"> Correct</span></div>
      <div class="score-item">⭐ <span id="stars-count">0</span><span class="score-label"> Stars</span></div>
    </div>
  </main>
  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const CHALLENGES = [
      {emoji:'🐱', words:['The','cat','sat','on','a','mat'], answer:'The cat sat on a mat'},
      {emoji:'🐶', words:['I','love','my','big','brown','dog'], answer:'I love my big brown dog'},
      {emoji:'☀️', words:['The','sun','is','hot','today'], answer:'The sun is hot today'},
      {emoji:'🚌', words:['She','got','on','the','red','bus'], answer:'She got on the red bus'},
      {emoji:'🐟', words:['A','fish','swam','in','the','pond'], answer:'A fish swam in the pond'},
      {emoji:'🌧️', words:['It','is','a','wet','rainy','day'], answer:'It is a wet rainy day'},
      {emoji:'🎩', words:['The','hat','is','on','his','head'], answer:'The hat is on his head'},
      {emoji:'🐷', words:['The','fat','pig','ate','the','bun'], answer:'The fat pig ate the bun'},
      {emoji:'🦊', words:['A','red','fox','ran','in','the','woods'], answer:'A red fox ran in the woods'},
      {emoji:'🌈', words:['We','can','see','a','big','rainbow'], answer:'We can see a big rainbow'},
    ];

    let builtWords = [], selectedChallenge = 0, correctCount = 0, hintShown = false;

    const challengesGrid = document.getElementById('challenges-grid');
    CHALLENGES.forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.className = `challenge-btn ${i===0?'active':''}`;
      btn.innerHTML = `${ch.emoji}<br>${ch.answer.split(' ').slice(0,3).join(' ')}…`;
      btn.addEventListener('click', () => {
        challengesGrid.querySelectorAll('.challenge-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedChallenge = i;
        loadChallenge();
        AudioManager.playTone('click');
      });
      challengesGrid.appendChild(btn);
    });

    function loadChallenge() {
      const ch = CHALLENGES[selectedChallenge];
      builtWords = [];
      hintShown = false;
      document.getElementById('hint-bar').style.display = 'none';
      document.getElementById('check-msg').classList.remove('show');
      renderZone();
      const shuffled = UI.shuffle([...ch.words]);
      const bank = document.getElementById('word-bank');
      bank.innerHTML = '';
      shuffled.forEach(w => {
        const btn = document.createElement('button');
        btn.className = 'bank-word';
        btn.textContent = w;
        btn.dataset.word = w;
        btn.addEventListener('click', () => {
          if (btn.classList.contains('used')) return;
          btn.classList.add('used');
          builtWords.push(w);
          renderZone();
          AudioManager.speak(w, {rate:0.8});
          AudioManager.playTone('click');
        });
        bank.appendChild(btn);
      });
    }

    function renderZone() {
      const zone = document.getElementById('sentence-zone');
      zone.innerHTML = '';
      if (builtWords.length === 0) {
        zone.innerHTML = '<span class="zone-placeholder">Tap words below to build your sentence!</span>';
        zone.classList.remove('has-words');
      } else {
        zone.classList.add('has-words');
        builtWords.forEach((w, i) => {
          const chip = document.createElement('div');
          chip.className = 'built-word';
          chip.textContent = w;
          chip.addEventListener('click', () => {
            // Remove word, unmark bank
            builtWords.splice(i, 1);
            const bankBtn = document.querySelector(`.bank-word[data-word="${w}"].used`);
            if (bankBtn) bankBtn.classList.remove('used');
            renderZone();
            AudioManager.playTone('click');
          });
          zone.appendChild(chip);
        });
      }
    }

    document.getElementById('btn-check').addEventListener('click', () => {
      if (builtWords.length === 0) { UI.toast('Tap some words first! 👆'); return; }
      const ch = CHALLENGES[selectedChallenge];
      const built = builtWords.join(' ').replace(/[.,!?]/g,'').toLowerCase();
      const answer = ch.answer.replace(/[.,!?]/g,'').toLowerCase();
      const msgEl = document.getElementById('check-msg');
      if (built === answer) {
        msgEl.textContent = '🎉 Correct! Well done!';
        msgEl.className = 'sentence-check show correct-msg';
        AudioManager.playTone('star');
        UI.showFeedback(true);
        correctCount++;
        document.getElementById('correct-count').textContent = correctCount;
        document.getElementById('stars-count').textContent = Math.floor(correctCount / 2);
        UI.setScore('sentence_builder', {stars: Math.floor(correctCount/2), total: correctCount});
      } else {
        msgEl.textContent = `💪 Not quite — try again! The answer starts with: "${ch.words[0]} ${ch.words[1]}…"`;
        msgEl.className = 'sentence-check show wrong-msg';
        AudioManager.playTone('wrong');
      }
    });

    document.getElementById('btn-hint').addEventListener('click', () => {
      const ch = CHALLENGES[selectedChallenge];
      hintShown = true;
      document.getElementById('hint-bar').style.display = 'block';
      document.getElementById('hint-text').textContent = ch.answer;
      AudioManager.speak(ch.answer, {rate:0.75});
    });

    document.getElementById('btn-clear-s').addEventListener('click', () => { loadChallenge(); AudioManager.playTone('click'); });
    document.getElementById('btn-read-s').addEventListener('click', () => {
      if (builtWords.length) AudioManager.speak(builtWords.join(' '), {rate:0.75});
    });

    loadChallenge();
  </script>
</body>
</html>
